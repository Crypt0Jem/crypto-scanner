<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Scanner — Crypto Trade Setups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1e;--bg2:#0d1426;--bg3:#111827;--bg4:#1a2236;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#ffffff;--text2:#888;--text3:#444;
  --green:#00e5bb;--green-bg:rgba(0,229,187,0.07);--green-b:rgba(0,229,187,0.2);
  --red:#ff4d6a;--red-bg:rgba(255,77,106,0.07);--red-b:rgba(255,77,106,0.2);
  --amber:#f0b429;--amber-bg:rgba(240,180,41,0.07);--amber-b:rgba(240,180,41,0.2);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.07);--blue-b:rgba(59,130,246,0.2);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.07);--purple-b:rgba(139,92,246,0.2);
  --mono:'DM Mono',monospace;--display:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--display)}
body{min-height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* ── Sidebar ── */
.sidebar{background:var(--bg);border-right:1px solid var(--border);padding:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.logo-text{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green)}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;letter-spacing:.04em}
.sb-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);padding:10px 16px 5px}
.tf-row{display:flex;gap:2px;padding:0 10px;margin-bottom:8px}
.tf-btn{flex:1;padding:5px 0;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text3);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:center;transition:all .1s}
.tf-btn:hover{color:var(--text2)}
.tf-btn.active{background:rgba(0,229,187,0.08);color:var(--green);border-color:rgba(0,229,187,0.2)}
.coin-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 16px;border-radius:0;border:none;border-left:2px solid transparent;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--display);font-size:12px;transition:all .1s}
.coin-btn:hover{background:rgba(255,255,255,0.03);color:var(--text)}
.coin-btn.active{background:rgba(0,229,187,0.04);color:var(--text);border-left-color:var(--green)}
.coin-name{font-weight:600;font-size:13px;letter-spacing:.02em}
.coin-meta{text-align:right}
.coin-px{font-family:var(--mono);font-size:10px;color:var(--text2);display:block}
.cbadge{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:3px;display:inline-block;margin-top:2px;letter-spacing:.03em}
.cbl{background:var(--green-bg);color:var(--green)}
.cbs{background:var(--red-bg);color:var(--red)}
.cbn{color:var(--text3)}
.cbw{background:var(--amber-bg);color:var(--amber)}
.cbp{background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.35);animation:prime-pulse 2s ease-in-out infinite}
@keyframes prime-pulse{0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,0)}50%{box-shadow:0 0 6px 2px rgba(167,139,250,0.25)}}
.sb-coins{padding:0;flex:1}
.rbtn{margin:6px 10px 0;padding:8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;text-align:center;transition:all .1s;width:calc(100% - 20px)}
.rbtn:hover{border-color:var(--border2);color:var(--text2)}
.rbtn:disabled{opacity:.3;cursor:not-allowed}
.last-upd{text-align:center;font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:5px;padding:0 10px}

/* ── Mode + Leverage ── */
.mode-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.mode-label{font-size:9px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.mode-btns{display:flex;gap:2px}
.mode-btn{padding:5px 12px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .1s}
.mode-btn:hover{color:var(--text2)}
.mode-btn.active.swing-active{background:rgba(59,130,246,0.08);color:var(--blue);border-color:rgba(59,130,246,0.2)}
.mode-btn.active.scalp-active{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b)}
.mode-desc{font-size:9px;color:var(--text3);font-family:var(--mono)}
.lev-section{padding:4px 10px 6px}
.lev-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);padding:4px 4px 4px}
.lev-row{display:flex;gap:2px;flex-wrap:wrap}
.lev-btn{padding:4px 7px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .1s}
.lev-btn:hover{color:var(--text2);border-color:var(--border2)}
.lev-btn.active{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b)}

/* ── Main ── */
.main{overflow-y:auto;background:var(--bg)}
.alerts-bar{background:rgba(0,229,187,0.05);border-bottom:1px solid rgba(0,229,187,0.15);padding:6px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.alert-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--green);flex-shrink:0}
.alert-item{font-family:var(--mono);font-size:10px;color:var(--green);padding:2px 8px;background:rgba(0,229,187,.08);border-radius:3px}

.mhdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.coin-tf{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.coin-full{font-size:20px;font-weight:600;letter-spacing:-.01em}
.price-row{display:flex;align-items:baseline;gap:6px;margin-top:3px;flex-wrap:wrap}
.price-big{font-family:var(--mono);font-size:20px;font-weight:500}
.price-chg{font-family:var(--mono);font-size:12px}
.score-box{text-align:right}
.score-num{font-family:var(--mono);font-size:36px;font-weight:500;line-height:1;color:var(--green)}
.score-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-top:3px}

.entry-toggle{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.et-label{font-size:10px;color:var(--text3);font-family:var(--mono)}
.et-btns{display:flex;gap:2px}
.et-btn{padding:4px 10px;border-radius:3px;border:1px solid transparent;background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .1s}
.et-btn:hover{color:var(--text2)}
.et-btn.active{background:rgba(59,130,246,0.08);color:var(--blue);border-color:rgba(59,130,246,0.2)}
.et-info{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* ── Cards ── */
.content{padding:14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}
.card{background:transparent;border:1px solid var(--border);border-radius:8px;padding:14px}
.card-title{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);margin-bottom:10px}

.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.srow:last-child{border-bottom:none}
.skey{font-size:11px;color:var(--text3);font-family:var(--mono)}
.sval{font-family:var(--mono);font-size:12px;font-weight:500}
.vg{color:var(--green)}.vr{color:var(--red)}.vb{color:var(--blue)}.va{color:var(--amber)}.vp{color:var(--purple)}
.rrtag{font-size:9px;padding:2px 6px;border-radius:3px;margin-left:6px;font-family:var(--mono)}
.rrg{background:var(--green-bg);color:var(--green)}
.rrr{background:var(--red-bg);color:var(--red)}
.opt-note{font-size:11px;color:var(--amber);font-family:var(--mono);margin-top:8px;padding:7px 10px;background:var(--amber-bg);border-radius:5px;border:1px solid var(--amber-b);line-height:1.6}
.pattern-note{font-size:11px;color:var(--purple);font-family:var(--mono);margin-top:8px;padding:7px 10px;background:var(--purple-bg);border-radius:5px;border:1px solid var(--purple-b);line-height:1.6}

.tv-wrap{width:100%;height:420px;border-radius:6px;overflow:hidden;background:var(--bg3)}

/* Pattern card */
.pattern-card{background:transparent;border:1px solid var(--purple-b);border-radius:8px;padding:14px}
.pattern-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.pattern-name{font-size:16px;font-weight:600;color:var(--purple)}
.pattern-badges{display:flex;gap:4px;flex-wrap:wrap}
.pbadge{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:3px}
.pb-high{background:var(--green-bg);color:var(--green)}
.pb-medium{background:var(--amber-bg);color:var(--amber)}
.pb-low{background:var(--red-bg);color:var(--red)}
.pb-stage{background:var(--purple-bg);color:var(--purple)}
.pb-winrate{background:var(--blue-bg);color:var(--blue)}
.pattern-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.pattern-levels{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.pl-item{background:rgba(255,255,255,.02);border-radius:5px;padding:7px 10px;border:1px solid var(--border)}
.pl-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);color:var(--text3);margin-bottom:3px}
.pl-val{font-family:var(--mono);font-size:13px;font-weight:500}
.watch-level{background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:5px;padding:8px 12px;font-size:11px;color:var(--amber);margin-bottom:8px;font-family:var(--mono)}
.action-level{background:var(--green-bg);border:1px solid var(--green-b);border-radius:5px;padding:8px 12px;font-size:11px;color:var(--green);font-family:var(--mono)}

.metrics-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.metric{background:rgba(255,255,255,0.02);border-radius:6px;padding:10px 12px;border:1px solid var(--border)}
.mlbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:4px}
.mval{font-family:var(--mono);font-size:16px;font-weight:500}
.msub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px}

.ai-card{background:transparent;border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:14px}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--text2);font-family:var(--mono);font-size:12px}
.ai-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.ai-col-title{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:6px}
.bull-col .ai-col-title{color:var(--green)}
.bear-col .ai-col-title{color:var(--red)}
.ai-text{font-size:11px;line-height:1.65;color:var(--text2)}
.conviction-bar{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}

.oi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.oi-item{background:rgba(255,255,255,.02);border-radius:6px;padding:10px 12px;border:1px solid var(--border)}
.oi-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--text3);margin-bottom:4px}
.oi-val{font-family:var(--mono);font-size:16px;font-weight:500}
.oi-sub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px}

.pred-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pred-label{font-size:11px;font-family:var(--mono);color:var(--text2)}
.pred-pct{font-size:11px;font-family:var(--mono)}
.pred-track{height:3px;background:var(--border);border-radius:2px;flex:1;margin:0 10px}
.pred-fill-g{height:100%;background:var(--green);border-radius:2px}
.pred-fill-r{height:100%;background:var(--red);border-radius:2px}
.pred-lvl{background:rgba(255,255,255,.02);border-radius:5px;padding:8px 10px;text-align:center;border:1px solid var(--border)}
.pred-lvl-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);color:var(--text3);margin-bottom:3px}
.pred-lvl-price{font-family:var(--mono);font-size:13px;font-weight:500}

.scan-table,.stable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
.scan-table th,.stable th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:8px 10px;border-bottom:1px solid var(--border);font-weight:500}
.scan-table td,.stable td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
.scan-table tr:last-child td,.stable tr:last-child td{border-bottom:none}
.scan-table tr:hover td,.stable tr:hover td{background:rgba(255,255,255,0.02)}

/* Volume profile */
.vrow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.vp-lbl{font-family:var(--mono);font-size:10px;color:var(--text3);width:70px;flex-shrink:0}
.vtrack{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px}
.vfill{height:100%;border-radius:2px}
.vpct{font-family:var(--mono);font-size:10px;color:var(--text3);width:55px;text-align:right;white-space:nowrap}

/* OI card */
.oi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.oic{background:rgba(255,255,255,0.02);border-radius:6px;padding:10px 12px;border:1px solid var(--border)}
.oil{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:var(--mono);margin-bottom:4px}
.oiv{font-family:var(--mono);font-size:15px;font-weight:500}
.ois{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px}

/* Predictive model */
.pbar{height:100%;border-radius:2px}

/* Leverage card */
.lev-card{background:transparent;border:1px solid var(--border);border-radius:8px;padding:14px}
.lev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.lev-item{background:rgba(255,255,255,0.02);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
.li-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);margin-bottom:3px}
.li-val{font-family:var(--mono);font-size:13px;font-weight:500}
.liq-warning{font-size:10px;font-family:var(--mono);line-height:1.6;padding:6px 0}

/* CVD chart */
#cvd-chart{width:100%;height:120px}
.cvd-wrap{width:100%;height:120px;background:var(--bg3);border-radius:6px;overflow:hidden;margin-top:8px}


.spin{width:12px;height:12px;border:1.5px solid rgba(255,255,255,.08);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:10px;color:var(--text3);font-family:var(--mono);font-size:12px}
.pos{color:var(--green)}.neg{color:var(--red)}
.foot{font-size:9px;color:var(--text3);font-family:var(--mono);padding-top:10px;border-top:1px solid var(--border);margin-top:4px;line-height:1.7}

/* MTF */
.mtf-card{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:14px}
.mtf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.mtf-title{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono)}
.mtf-score-pill{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:600;font-family:var(--mono)}
.mtf-strong{background:var(--green-bg);color:var(--green)}
.mtf-good{background:var(--blue-bg);color:var(--blue)}
.mtf-mixed{background:var(--amber-bg);color:var(--amber)}
.mtf-weak{background:var(--red-bg);color:var(--red)}
.mtf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.mtf-tf{background:rgba(255,255,255,0.02);border-radius:6px;padding:10px;border:1px solid var(--border);text-align:center}
.mtf-tf-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--text3);margin-bottom:4px}
.mtf-tf-trend{font-size:12px;font-weight:600;margin-bottom:3px}
.mtf-tf-rsi{font-size:9px;font-family:var(--mono);color:var(--text3)}
.mtf-tf-detail{font-size:9px;font-family:var(--mono);color:var(--text3);margin-top:1px}
.weekly-filter{border-radius:6px;padding:8px 12px;font-size:11px;font-family:var(--mono);line-height:1.6}
.wf-bull{background:var(--green-bg);border:1px solid var(--green-b);color:var(--green)}
.wf-bear{background:var(--red-bg);border:1px solid var(--red-b);color:var(--red)}
.wf-neutral{background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber)}

@media(max-width:960px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto}
  .content{grid-template-columns:1fr}
  .metrics-grid{grid-template-columns:repeat(3,1fr)}
  .ai-2col{grid-template-columns:1fr}
  .oi-grid{grid-template-columns:1fr 1fr}
  .pattern-levels{grid-template-columns:1fr}
  .mtf-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-text">Signal Scanner</div>
    <div class="logo-sub">crypto trade setups</div>
  </div>
  <div class="sb-label">Timeframe</div>
  <div class="tf-row">
    <button class="tf-btn active" onclick="selectTF('1d',this)">1D</button>
    <button class="tf-btn" onclick="selectTF('4h',this)">4H</button>
    <button class="tf-btn" onclick="selectTF('1h',this)">1H</button>
    <button class="tf-btn" onclick="selectTF('15m',this)">15M</button>
  </div>
  <div class="sb-label" style="margin-top:2px">Mode</div>
  <div style="padding:0 10px;margin-bottom:8px">
    <div style="display:flex;gap:2px">
      <button class="mode-btn active swing-active" id="mode-swing" onclick="setMode('swing',this)" style="flex:1;font-size:10px;padding:5px 0">📈 Swing</button>
      <button class="mode-btn" id="mode-scalp" onclick="setMode('scalp',this)" style="flex:1;font-size:10px;padding:5px 0">⚡ Scalp</button>
    </div>
    <div class="mode-desc" id="mode-desc" style="margin-top:4px;padding:0 2px">W/D/4H/1H • swing trades</div>
  </div>
  <div class="sb-label">Markets</div>
  <div class="sb-coins" id="coin-list"><div class="loading-full" style="min-height:80px"><div class="spin"></div></div></div>
  <div class="lev-section" style="margin-top:auto">
    <div class="lev-label">Leverage</div>
    <div class="lev-row">
      <button class="lev-btn" onclick="setLev(1,this)">1x</button>
      <button class="lev-btn" onclick="setLev(10,this)">10x</button>
      <button class="lev-btn" onclick="setLev(25,this)">25x</button>
      <button class="lev-btn active" onclick="setLev(50,this)">50x</button>
      <button class="lev-btn" onclick="setLev(75,this)">75x</button>
      <button class="lev-btn" onclick="setLev(100,this)">100x</button>
      <button class="lev-btn" onclick="setLev(125,this)">125x</button>
    </div>
  </div>
  <button class="rbtn" id="rbtn" onclick="init()">↻ Refresh all data</button>
  <button class="rbtn" id="trade-log-btn" onclick="showTradeLog()" style="margin-top:4px;border-color:rgba(0,229,187,0.2);color:var(--green)">📊 Trade Log</button>
  <div id="session-pnl-panel" style="margin:6px 10px 0;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;display:none"></div>
  <div class="last-upd" id="last-upd">—</div>
  <div class="last-upd" id="ws-status" style="margin-top:3px"></div>
  <div style="padding:6px 10px 10px">
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:10px;font-family:var(--mono);color:var(--text3)">
      <input type="checkbox" id="liq-heat-toggle" onchange="toggleLiqHeatmap(this.checked)" style="cursor:pointer;accent-color:var(--green)">
      Real Liq Heat
    </label>
  </div>
</aside>

<main class="main">
  <div id="alerts-bar"></div>
  <div id="main-content"><div class="loading-full"><div class="spin"></div><span>Fetching live data...</span></div></div>
</main>
</div>

<script src="/app.js"></script>
</body>
</html>
