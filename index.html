<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Scanner — Crypto Trade Setups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#1e1e1e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#888;--text3:#666;
  --green:#00d084;--green-bg:rgba(0,208,132,0.08);--green-b:rgba(0,208,132,0.25);
  --red:#ff4d4d;--red-bg:rgba(255,77,77,0.08);--red-b:rgba(255,77,77,0.25);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,0.08);--amber-b:rgba(245,166,35,0.25);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,0.08);--blue-b:rgba(74,158,255,0.25);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.08);--purple-b:rgba(167,139,250,0.25);
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--display)}
body{min-height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:0 16px 18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.logo-text{font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.logo-sub{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:3px}
.sb-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);font-family:var(--mono);padding:0 16px;margin-bottom:6px}
.tf-row{display:flex;gap:3px;padding:0 10px;margin-bottom:18px}
.tf-btn{flex:1;padding:7px 0;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;text-align:center;transition:all .12s}
.tf-btn:hover{color:var(--text2);border-color:var(--border2)}
.tf-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.coin-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 12px;border-radius:7px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--display);font-size:13px;transition:all .15s;margin-bottom:3px}
.coin-btn:hover{background:var(--bg3);color:var(--text)}
.coin-btn.active{background:var(--bg3);color:var(--text);outline:1px solid var(--border2)}
.coin-name{font-weight:500}
.coin-meta{text-align:right}
.coin-px{font-family:var(--mono);font-size:11px;color:var(--text2);display:block}
.cbadge{font-size:10px;font-family:var(--mono);padding:3px 7px;border-radius:4px;display:inline-block;margin-top:3px}
.cbl{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.cbs{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.cbn{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.cbw{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.sb-coins{padding:0 5px;flex:1}
.rbtn{margin:auto 10px 0;padding:11px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;text-align:center;transition:all .15s}
.rbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.rbtn:disabled{opacity:.4;cursor:not-allowed}
.last-upd{text-align:center;font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:8px;padding:0 10px}

.main{overflow-y:auto}
.alerts-bar{background:var(--green-bg);border-bottom:1px solid var(--green-b);padding:9px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.alert-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);color:var(--green);flex-shrink:0}
.alert-item{font-family:var(--mono);font-size:12px;color:var(--green);padding:4px 10px;background:rgba(0,208,132,.1);border-radius:4px;border:1px solid var(--green-b)}

.mhdr{padding:22px 26px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.coin-tf{font-size:11px;color:var(--text2);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.coin-full{font-size:26px;font-weight:700}
.price-row{display:flex;align-items:baseline;gap:8px;margin-top:4px;flex-wrap:wrap}
.price-big{font-family:var(--mono);font-size:24px}
.price-chg{font-family:var(--mono);font-size:15px}
.score-box{text-align:right}
.score-num{font-family:var(--mono);font-size:40px;font-weight:500;line-height:1}
.score-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-top:4px}

.entry-toggle{display:flex;align-items:center;gap:10px;padding:12px 26px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.et-label{font-size:12px;color:var(--text);font-family:var(--mono)}
.et-btns{display:flex;gap:3px}
.et-btn{padding:5px 14px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .12s}
.et-btn.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-b)}
.et-info{font-size:11px;color:var(--text2);font-family:var(--mono)}

.content{padding:22px 26px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.full{grid-column:1/-1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);font-family:var(--mono);margin-bottom:12px}

.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.skey{font-size:13px;color:var(--text2);font-family:var(--mono)}
.sval{font-family:var(--mono);font-size:14px;font-weight:500}
.vg{color:var(--green)}.vr{color:var(--red)}.vb{color:var(--blue)}.va{color:var(--amber)}.vp{color:var(--purple)}
.rrtag{font-size:10px;padding:3px 7px;border-radius:4px;margin-left:6px;font-family:var(--mono)}
.rrg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.rrr{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.opt-note{font-size:12px;color:var(--amber);font-family:var(--mono);margin-top:8px;padding:8px 10px;background:var(--amber-bg);border-radius:6px;border:1px solid var(--amber-b);line-height:1.6}
.pattern-note{font-size:12px;color:var(--purple);font-family:var(--mono);margin-top:8px;padding:8px 10px;background:var(--purple-bg);border-radius:6px;border:1px solid var(--purple-b);line-height:1.6}

.tv-wrap{width:100%;height:460px;border-radius:7px;overflow:hidden;background:var(--bg3)}

/* Pattern card */
.pattern-card{background:linear-gradient(135deg,var(--purple-bg),rgba(167,139,250,0.02));border:1px solid var(--purple-b);border-radius:12px;padding:20px}
.pattern-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.pattern-name{font-size:20px;font-weight:700;color:var(--purple)}
.pattern-badges{display:flex;gap:6px;flex-wrap:wrap}
.pbadge{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:5px}
.pb-high{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.pb-medium{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.pb-low{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.pb-stage{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-b)}
.pb-winrate{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}
.pattern-desc{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:14px}
.pattern-levels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pl-item{background:rgba(255,255,255,.03);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
.pl-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);color:var(--text2);margin-bottom:4px}
.pl-val{font-family:var(--mono);font-size:14px;font-weight:500}
.watch-level{background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:7px;padding:11px 14px;font-size:13px;color:var(--amber);margin-bottom:10px}
.action-level{background:var(--green-bg);border:1px solid var(--green-b);border-radius:7px;padding:11px 14px;font-size:13px;color:var(--green)}

.metrics-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.metric{background:var(--bg3);border-radius:8px;padding:13px 14px;border:1px solid var(--border)}
.mlbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:5px}
.mval{font-family:var(--mono);font-size:16px;font-weight:500}
.msub{font-size:11px;color:var(--text2);margin-top:3px;font-family:var(--mono)}

.vrow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.vp-lbl{font-family:var(--mono);font-size:11px;color:var(--text2);width:80px;text-align:right;flex-shrink:0}
.vtrack{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.vfill{height:100%;border-radius:3px}
.vpct{font-family:var(--mono);font-size:11px;color:var(--text2);min-width:44px}

.oi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.oic{background:var(--bg3);border-radius:8px;padding:13px 14px;border:1px solid var(--border)}
.oil{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);color:var(--text2);margin-bottom:5px}
.oiv{font-family:var(--mono);font-size:16px;font-weight:500}
.ois{font-size:11px;color:var(--text2);margin-top:3px;font-family:var(--mono)}

.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.pk{font-family:var(--mono);font-size:13px;color:var(--text)}
.pright{display:flex;align-items:center;gap:7px}
.pval{font-family:var(--mono);font-size:14px;font-weight:500}
.pbar-w{width:75px;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pbar{height:100%;border-radius:2px}
.ppct{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:30px}
.pred-levels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:10px}

.ai-card{background:linear-gradient(135deg,rgba(74,158,255,.04),rgba(0,208,132,.04));border:1px solid rgba(74,158,255,.15);border-radius:10px;padding:14px}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-family:var(--mono);font-size:11px}
.ai-summary{font-size:14px;line-height:1.8;color:var(--text);margin-bottom:14px}
.ai-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ai-block{background:rgba(255,255,255,.03);border-radius:7px;padding:10px;border:1px solid var(--border)}
.ai-btitle{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:6px}
.ai-btext{font-size:13px;line-height:1.7;color:var(--text2)}
.ai-risk{background:var(--red-bg);border:1px solid var(--red-b);border-radius:7px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--red)}
.ai-action{background:var(--green-bg);border:1px solid var(--green-b);border-radius:7px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--green)}
.ai-pattern-hist{font-size:12px;color:var(--text2);font-family:var(--mono);border-top:1px solid var(--border);padding-top:10px;margin-top:5px;line-height:1.7}

.stable{width:100%;border-collapse:collapse}
.stable th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-family:var(--mono);padding:9px 10px;border-bottom:1px solid var(--border);text-align:left;font-weight:500}
.stable td{font-family:var(--mono);font-size:13px;padding:11px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.stable tr:last-child td{border-bottom:none}
.stable tbody tr{cursor:pointer;transition:background .12s}
.stable tbody tr:hover td{background:var(--bg3)}
.stable tbody tr.arow td{background:rgba(74,158,255,.05)}
.smbar{display:flex;align-items:center;gap:5px}
.smtrack{width:56px;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.smfill{height:100%;border-radius:2px}


/* Leverage selector */
.lev-section{padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.lev-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);margin-bottom:5px}
.lev-row{display:flex;gap:3px;flex-wrap:wrap}
.lev-btn{padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .12s}
.lev-btn:hover{color:var(--text2);border-color:var(--border2)}
.lev-btn.active{background:rgba(255,77,77,0.15);color:var(--red);border-color:var(--red-b);font-weight:500}
/* Leverage info card */
.lev-card{background:rgba(255,77,77,0.05);border:1px solid var(--red-b);border-radius:10px;padding:14px;margin-bottom:0}
.lev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px}
.lev-item{background:var(--bg3);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
.lev-item .li-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);color:var(--text2);margin-bottom:4px}
.lev-item .li-val{font-family:var(--mono);font-size:14px;font-weight:500}
.liq-warning{background:rgba(255,77,77,0.1);border:1px solid var(--red-b);border-radius:6px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--red);font-family:var(--mono);line-height:1.6}
/* Custom chart */
.chart-canvas-wrap{position:relative;width:100%;height:420px;background:var(--bg3);border-radius:7px;overflow:hidden}
#custom-chart{width:100%;height:100%}
.chart-legend{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3);font-family:var(--mono)}
.cl-line{width:16px;height:2px;border-radius:1px}


/* Mode selector */
.mode-bar{display:flex;align-items:center;gap:10px;padding:12px 26px;border-bottom:1px solid var(--border);background:var(--bg2)}
.mode-label{font-size:11px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.mode-btns{display:flex;gap:4px}
.mode-btn{padding:7px 18px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;font-weight:500}
.mode-btn:hover{border-color:var(--border2);color:var(--text)}
.mode-btn.active.swing-active{background:rgba(74,158,255,.12);color:var(--blue);border-color:var(--blue-b)}
.mode-btn.active.scalp-active{background:rgba(245,166,35,.12);color:var(--amber);border-color:var(--amber-b)}
.mode-desc{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* MTF confluence card */
.mtf-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:0}
.mtf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.mtf-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);font-family:var(--mono)}
.mtf-score-pill{padding:5px 14px;border-radius:99px;font-size:12px;font-weight:600;font-family:var(--mono)}
.mtf-strong{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.mtf-good{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid var(--blue-b)}
.mtf-mixed{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.mtf-weak{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.mtf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.mtf-tf{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border);text-align:center}
.mtf-tf-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--text2);margin-bottom:6px}
.mtf-tf-trend{font-size:14px;font-weight:600;margin-bottom:4px}
.mtf-tf-rsi{font-size:10px;font-family:var(--mono);color:var(--text2)}
.mtf-tf-detail{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:2px}
.weekly-filter{border-radius:8px;padding:12px 14px;font-size:12px;font-family:var(--mono);line-height:1.6;margin-top:4px}
.wf-bull{background:var(--green-bg);border:1px solid var(--green-b);color:var(--green)}
.wf-bear{background:var(--red-bg);border:1px solid var(--red-b);color:var(--red)}
.wf-neutral{background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber)}

.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--text2);font-family:var(--mono);font-size:14px}
.pos{color:var(--green)}.neg{color:var(--red)}
.foot{font-size:11px;color:var(--text2);font-family:var(--mono);padding-top:12px;border-top:1px solid var(--border);margin-top:6px;line-height:1.7}

@media(max-width:960px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto}
  .content{grid-template-columns:1fr}
  .metrics-grid{grid-template-columns:repeat(3,1fr)}
  .ai-2col{grid-template-columns:1fr}
  .oi-grid{grid-template-columns:1fr 1fr}
  .pred-levels{grid-template-columns:1fr 1fr}
  .pattern-levels{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-text">Signal Scanner</div>
    <div class="logo-sub">crypto trade setups</div>
  </div>
  <div class="sb-label" style="margin-bottom:5px">Timeframe</div>
  <div class="tf-row">
    <button class="tf-btn active" onclick="selectTF('1d',this)">1D</button>
    <button class="tf-btn" onclick="selectTF('4h',this)">4H</button>
    <button class="tf-btn" onclick="selectTF('1h',this)">1H</button>
    <button class="tf-btn" onclick="selectTF('15m',this)">15M</button>
  </div>
  <div class="sb-label" style="margin-top:4px">Mode</div>
  <div style="padding:0 10px;margin-bottom:16px">
    <div style="display:flex;gap:4px">
      <button class="mode-btn active swing-active" id="mode-swing" onclick="setMode('swing',this)" style="flex:1;font-size:11px;padding:6px 0">📈 Swing</button>
      <button class="mode-btn" id="mode-scalp" onclick="setMode('scalp',this)" style="flex:1;font-size:11px;padding:6px 0">⚡ Scalp</button>
    </div>
    <div class="mode-desc" id="mode-desc" style="margin-top:5px;padding:0 2px">W/D/4H/1H • swing trades</div>
  </div>
  <div class="sb-label">Markets</div>
  <div class="sb-coins" id="coin-list"><div class="loading-full" style="min-height:80px"><div class="spin"></div></div></div>
  <div class="lev-section" style="margin-top:auto">
    <div class="lev-label">Leverage</div>
    <div class="lev-row">
      <button class="lev-btn" onclick="setLev(1,this)">1x</button>
      <button class="lev-btn" onclick="setLev(10,this)">10x</button>
      <button class="lev-btn" onclick="setLev(25,this)">25x</button>
      <button class="lev-btn active" onclick="setLev(50,this)">50x</button>
      <button class="lev-btn" onclick="setLev(75,this)">75x</button>
