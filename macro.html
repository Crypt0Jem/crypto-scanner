<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro & Cascade Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #080b0f;
    --bg2: #0d1117;
    --bg3: #121820;
    --bg4: #171f2a;
    --border: rgba(255,255,255,0.07);
    --text1: #e8edf3;
    --text2: #8b96a3;
    --text3: #4a5568;
    --green: #00d484;
    --green-dim: rgba(0,212,132,0.15);
    --red: #ff4d4d;
    --red-dim: rgba(255,77,77,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text1);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,11,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--purple);
    letter-spacing: -0.02em;
  }

  .header-left p {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .coin-tabs {
    display: flex;
    gap: 4px;
  }

  .coin-tab {
    padding: 8px 18px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .coin-tab:hover { border-color: var(--purple); color: var(--purple); }
  .coin-tab.active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }

  .back-btn {
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .back-btn:hover { border-color: var(--text2); color: var(--text1); }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .full-width { grid-column: 1 / -1; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .card-title {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    margin-bottom: 14px;
    font-family: var(--mono);
  }

  /* Position gauge */
  .cycle-gauge {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .gauge-bar {
    flex: 1;
    min-width: 200px;
    height: 8px;
    background: var(--bg4);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .gauge-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
    background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
  }

  .gauge-label {
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }

  .gauge-val {
    font-size: 18px;
    font-family: var(--display);
    font-weight: 700;
  }

  /* Cascade levels */
  .cascade-section {
    margin-bottom: 8px;
  }

  .cascade-header {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 6px 10px;
    border-radius: 4px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cascade-header.up { background: var(--green-dim); color: var(--green); }
  .cascade-header.down { background: var(--red-dim); color: var(--red); }
  .cascade-header.boundary { background: var(--purple-dim); color: var(--purple); }
  .cascade-header.historical { background: var(--amber-dim); color: var(--amber); }

  .cascade-row {
    display: flex;
    align-items: center;
    padding: 7px 10px;
    border-radius: 4px;
    margin-bottom: 3px;
    border: 1px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .cascade-row:hover { background: var(--bg4); border-color: var(--border); }

  .cascade-row.scanner { border-left: 2px solid var(--purple); }
  .cascade-row.historical-down { border-left: 2px solid var(--amber); opacity: 0.8; }
  .cascade-row.historical-up { border-left: 2px solid var(--green); opacity: 0.8; }
  .cascade-row.current-price { background: var(--purple-dim); border: 1px solid var(--purple); }
  .cascade-row.limit-zone { border-left: 2px solid var(--blue); }

  .crow-arrow { font-size: 14px; margin-right: 8px; flex-shrink: 0; }
  .crow-price { font-family: var(--mono); font-size: 15px; font-weight: 700; min-width: 95px; }
  .crow-label { flex: 1; color: var(--text2); font-size: 13px; }
  .crow-prob { font-size: 10px; padding: 2px 6px; border-radius: 3px; }
  .crow-prob.high { background: var(--red-dim); color: var(--red); }
  .crow-prob.med { background: var(--amber-dim); color: var(--amber); }
  .crow-prob.low { background: var(--bg4); color: var(--text3); }
  .crow-prob.hist { background: var(--amber-dim); color: var(--amber); }
  .crow-prob.green { background: var(--green-dim); color: var(--green); }

  .boundary-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    margin: 8px 0;
    border-top: 1px dashed rgba(167,139,250,0.3);
    border-bottom: 1px dashed rgba(167,139,250,0.3);
  }

  .boundary-line span { font-size: 9px; color: var(--purple); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Limit order planner */
  .order-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    margin-bottom: 6px;
    background: var(--bg3);
    gap: 12px;
  }

  .order-price { font-family: var(--mono); font-size: 18px; font-weight: 700; min-width: 100px; }
  .order-label { flex: 1; }
  .order-label-main { font-size: 13px; color: var(--text1); }
  .order-label-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .order-lev { font-size: 11px; padding: 2px 8px; border-radius: 3px; font-weight: 700; }
  .order-size { font-size: 10px; color: var(--text3); text-align: right; }

  /* AI button */
  .ai-btn {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid var(--purple);
    background: var(--purple-dim);
    color: var(--purple);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .ai-btn:hover { background: rgba(167,139,250,0.25); transform: translateY(-1px); }
  .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .ai-output {
    margin-top: 14px;
    padding: 14px;
    background: var(--bg3);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 11px;
    line-height: 1.7;
    color: var(--text2);
    display: none;
  }

  .ai-output.visible { display: block; }
  .ai-output h3 { color: var(--purple); font-family: var(--display); font-size: 14px; margin-bottom: 8px; }
  .ai-output .bull { color: var(--green); }
  .ai-output .bear { color: var(--red); }
  .ai-output .neutral { color: var(--amber); }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .stat-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .stat-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-family: var(--display); font-weight: 700; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .green { color: var(--green); }
  .red { color: var(--red); }
  .amber { color: var(--amber); }
  .purple { color: var(--purple); }
  .blue { color: var(--blue); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text3);
    font-size: 11px;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .no-data {
    text-align: center;
    padding: 30px;
    color: var(--text3);
    font-size: 11px;
    line-height: 1.8;
  }

  .no-data a { color: var(--purple); text-decoration: none; }

  /* Projection targets */
  .proj-row {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 4px;
    margin-bottom: 3px;
    border-left: 2px solid transparent;
    gap: 10px;
  }

  .proj-row.conservative { border-color: var(--green); }
  .proj-row.moderate { border-color: var(--amber); }
  .proj-row.aggressive { border-color: var(--red); }
  .proj-row.ath { border-color: var(--purple); }

  .proj-price { font-family: var(--mono); font-size: 15px; font-weight: 700; min-width: 100px; }
  .proj-label { flex: 1; color: var(--text2); font-size: 13px; }
  .proj-mult { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--bg4); color: var(--text2); }

  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; padding: 12px; }
    .full-width { grid-column: 1; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🔭 Macro & Cascade Analysis</h1>
    <p>Cycle position · Cascade simulator · High/low projections</p>
  </div>
  <div class="coin-tabs" id="coin-tabs">
    <button class="coin-tab active" onclick="selectCoin('BTC')">BTC</button>
    <button class="coin-tab" onclick="selectCoin('ETH')">ETH</button>
    <button class="coin-tab" onclick="selectCoin('XRP')">XRP</button>
    <button class="coin-tab" onclick="selectCoin('SOL')">SOL</button>
    <button class="coin-tab" onclick="selectCoin('SUI')">SUI</button>
  </div>
  <a href="/" class="back-btn">← Scanner</a>
</div>

<div class="container" id="main-container">
  <div class="loading full-width">
    <span class="spinner"></span> Loading scanner data...
  </div>
</div>

<script>
// ── Static data ───────────────────────────────────────────────────────────────
const COINS = {
  BTC: { ath: 109000, prevHigh: 69000, bottom2022: 15500, bottom2020: 3800, bottom2018: 3200, dec: 0, sym: 'BTCUSDT', cycles: 3 },
  ETH: { ath: 4900,  prevHigh: 4868,  bottom2022: 880,   bottom2020: 88,   bottom2018: 83,   dec: 1, sym: 'ETHUSDT', cycles: 3 },
  XRP: { ath: 3.84,  prevHigh: 1.96,  bottom2022: 0.28,  bottom2020: 0.13, bottom2018: 0.25, dec: 4, sym: 'XRPUSDT', cycles: 3 },
  SOL: { ath: 295,   prevHigh: 259,   bottom2022: 8,     bottom2020: null, bottom2018: null, dec: 1, sym: 'SOLUSDT', cycles: 2 },
  SUI: { ath: 5.35,  prevHigh: 5.35,  bottom2022: null,  bottom2020: null, bottom2018: null, dec: 4, sym: 'SUIUSDT', cycles: 1 }
};

let activeCoin = 'BTC';
let scannerData = {};

// ── Load scanner data from localStorage ──────────────────────────────────────
function loadScannerData() {
  const coins = ['BTC','ETH','XRP','SOL','SUI'];
  coins.forEach(c => {
    try {
      const raw = localStorage.getItem('macroData_' + c);
      if (raw) scannerData[c] = JSON.parse(raw);
    } catch(e) {}
  });
}

function fn(v, dec) {
  if (!v && v !== 0) return '—';
  return parseFloat(v).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function pct(val, ref) {
  return ((val - ref) / ref * 100).toFixed(1);
}

// ── Cascade calculations ──────────────────────────────────────────────────────
function calcCascadeLevels(coin, price, liqZones) {
  const meta = COINS[coin];
  const dec = meta.dec;

  // Scanner liq levels (long liquidations = downside cascade)
  var longLiqs = [];
  var shortLiqs = [];

  if (liqZones && liqZones.longLiqZones) {
    longLiqs = liqZones.longLiqZones
      .filter(z => z.price < price)
      .sort((a,b) => b.price - a.price);
  }
  if (liqZones && liqZones.shortLiqZones) {
    shortLiqs = liqZones.shortLiqZones
      .filter(z => z.price > price)
      .sort((a,b) => a.price - b.price);
  }

  // Historical downside (ATH drawdowns)
  const histDown = [
    { pct: 75, price: +(meta.ath * 0.25).toFixed(dec), label: '75% below ATH' },
    { pct: 80, price: +(meta.ath * 0.20).toFixed(dec), label: '80% below ATH — typical bear bottom' },
    { pct: 85, price: +(meta.ath * 0.15).toFixed(dec), label: '85% below ATH — altcoin bear bottom' },
    { pct: 90, price: +(meta.ath * 0.10).toFixed(dec), label: '90% below ATH — black swan zone' },
    { pct: 95, price: +(meta.ath * 0.05).toFixed(dec), label: '95% below ATH — generational bottom' },
  ].filter(h => h.price < price);

  // Historical upside projections
  const histUp = [];
  if (meta.prevHigh > price) histUp.push({ price: meta.prevHigh, label: 'Previous cycle high', type: 'conservative' });
  histUp.push({ price: +(meta.ath * 1.0).toFixed(dec), label: 'ATH retest', type: 'moderate' });
  histUp.push({ price: +(meta.ath * 1.5).toFixed(dec), label: 'New ATH +50%', type: 'aggressive' });
  histUp.push({ price: +(meta.ath * 2.5).toFixed(dec), label: 'New ATH +150% (bull cycle)', type: 'aggressive' });


  // Fibonacci extensions: from all-time bottom to ATH, projected beyond ATH
  const fibBase2 = meta.allTimeBottom || meta.bottom2022 || meta.bottom2020 || +(meta.ath * 0.10);
  const fibRange = meta.ath - fibBase2;
  const fibLevels = [
    { price: +(meta.ath + fibRange * 0.236).toFixed(dec), label: 'Fib 1.236 (ATH +23.6%)', type: 'conservative' },
    { price: +(meta.ath + fibRange * 0.382).toFixed(dec), label: 'Fib 1.382 (ATH +38.2%)', type: 'conservative' },
    { price: +(meta.ath + fibRange * 0.618).toFixed(dec), label: 'Fib 1.618 extension',     type: 'moderate' },
    { price: +(meta.ath + fibRange * 1.0).toFixed(dec),   label: 'Fib 2.0 extension',       type: 'aggressive' },
    { price: +(meta.ath + fibRange * 1.618).toFixed(dec), label: 'Fib 2.618 extension',     type: 'aggressive' },
  ].filter(f => f.price > price * 1.05);

  // Altcoin multiplier projections from current price
  const multiples = [
    { mult: 3,  label: '3x from current — conservative', type: 'conservative' },
    { mult: 5,  label: '5x from current — moderate cycle', type: 'moderate' },
    { mult: 10, label: '10x from current — full bull cycle', type: 'aggressive' },
    { mult: 20, label: '20x from current — altcoin supercycle', type: 'ath' },
  ].map(m => ({ price: +(price * m.mult).toFixed(dec), label: m.label, type: m.type }))
   .filter(m => m.price > price);

  return { longLiqs, shortLiqs, histDown, histUp, fibLevels, multiples };
}

// ── Cycle position ────────────────────────────────────────────────────────────
function calcCyclePosition(coin, price) {
  const meta = COINS[coin];
  const fromAth = ((meta.ath - price) / meta.ath * 100).toFixed(1);
  const fromBottom = meta.bottom2022
    ? ((price - meta.bottom2022) / meta.bottom2022 * 100).toFixed(1)
    : null;

  // Simple cycle position based on ATH distance
  let position, posColor, posLabel;
  const athPct = (price / meta.ath * 100);
  if (athPct > 80) { position = 90; posColor = '#ff4d4d'; posLabel = 'Late Bull / Near Top'; }
  else if (athPct > 60) { position = 70; posColor = '#f5a623'; posLabel = 'Mid-Late Bull'; }
  else if (athPct > 40) { position = 50; posColor = '#f5a623'; posLabel = 'Mid Cycle'; }
  else if (athPct > 20) { position = 30; posColor = '#00d484'; posLabel = 'Early Bull / Bear Recovery'; }
  else { position = 10; posColor = '#a78bfa'; posLabel = 'Deep Bear / Accumulation'; }

  return { fromAth, fromBottom, position, posColor, posLabel, athPct: athPct.toFixed(1) };
}

// ── Render cascade levels ─────────────────────────────────────────────────────
function renderCascade(coin, price, liqZones) {
  const dec = COINS[coin].dec;
  const { longLiqs, shortLiqs, histDown, histUp, fibLevels, multiples } = calcCascadeLevels(coin, price, liqZones);

  let html = '';

  // ── UPSIDE ──────────────────────────────────────────────────────────────────
  html += '<div class="cascade-section">';
  html += '<div class="cascade-header up">▲ Upside cascade & projections</div>';

  // Historical & fib upside (show top 4 most relevant)
  const allUp = [...histUp, ...fibLevels, ...multiples]
    .filter(u => u.price > price)
    .sort((a,b) => a.price - b.price)
    .slice(0, 6);

  allUp.forEach(u => {
    const mult = (u.price / price).toFixed(1);
    const typeClass = u.type === 'conservative' ? 'green' : u.type === 'moderate' ? 'amber' : u.type === 'aggressive' ? 'red' : 'purple';
    html += `<div class="proj-row ${u.type}">
      <span class="proj-price green">$${fn(u.price, dec)}</span>
      <span class="proj-label">${u.label}</span>
      <span class="proj-mult">${mult}x</span>
    </div>`;
  });

  // Short squeeze cascade (scanner data)
  if (shortLiqs.length > 0) {
    html += '<div style="margin:8px 0 4px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">Short squeeze cascade (scanner)</div>';
    shortLiqs.slice(0, 4).forEach(z => {
      html += `<div class="cascade-row scanner">
        <span class="crow-arrow" style="color:var(--green)">↑</span>
        <span class="crow-price green">$${fn(z.price, dec)}</span>
        <span class="crow-label">${z.leverage}x shorts squeezed</span>
        <span class="crow-prob green">${z.significance||'cascade'}</span>
      </div>`;
    });
  }

  html += '</div>';

  // ── CURRENT PRICE ──────────────────────────────────────────────────────────
  html += `<div class="cascade-row current-price">
    <span class="crow-arrow">◆</span>
    <span class="crow-price purple">$${fn(price, dec)}</span>
    <span class="crow-label" style="color:var(--purple)">Current price</span>
    <span class="crow-prob" style="background:var(--purple-dim);color:var(--purple)">NOW</span>
  </div>`;

  // ── DOWNSIDE ───────────────────────────────────────────────────────────────
  html += '<div class="cascade-section" style="margin-top:8px">';
  html += '<div class="cascade-header down">▼ Downside cascade & lows</div>';

  // Long liquidation cascade (scanner data)
  const probabilities = [95, 85, 70, 55, 40];
  longLiqs.slice(0, 5).forEach((z, i) => {
    const prob = probabilities[i] || 30;
    const probClass = prob > 80 ? 'high' : prob > 60 ? 'med' : 'low';
    html += `<div class="cascade-row scanner">
      <span class="crow-arrow" style="color:var(--red)">↓</span>
      <span class="crow-price red">$${fn(z.price, dec)}</span>
      <span class="crow-label">${z.leverage}x longs liquidated</span>
      <span class="crow-prob ${probClass}">${prob}%</span>
    </div>`;
  });

  // Scanner boundary
  html += `<div class="boundary-line">
    <span>── Scanner boundary ──</span>
    <span style="color:var(--text3);font-size:9px">Historical data below</span>
  </div>`;

  // Historical lows
  histDown.forEach(h => {
    const probClass = h.pct <= 80 ? 'med' : h.pct <= 90 ? 'hist' : 'low';
    html += `<div class="cascade-row historical-down">
      <span class="crow-arrow" style="color:var(--amber)">↓</span>
      <span class="crow-price amber">$${fn(h.price, dec)}</span>
      <span class="crow-label">${h.label}</span>
      <span class="crow-prob ${probClass}">${h.pct <= 80 ? 'likely' : h.pct <= 90 ? 'black swan' : 'extreme'}</span>
    </div>`;
  });

  html += '</div>';
  return html;
}

// ── Render limit order planner ────────────────────────────────────────────────
function renderOrderPlan(coin, price, liqZones) {
  const dec = COINS[coin].dec;
  const meta = COINS[coin];

  // Suggested limit order levels
  const orders = [];

  // Near scanner boundary
  if (liqZones && liqZones.longLiqZones) {
    const lowest = liqZones.longLiqZones.sort((a,b) => a.price - b.price)[0];
    if (lowest) orders.push({
      price: lowest.price,
      label: `${lowest.leverage}x liq sweep zone`,
      sub: 'Bottom of scanner cascade — post-sweep entry',
      lev: '50x', levColor: 'var(--red)',
      size: '15% capital', type: 'scanner'
    });
  }

  // 80% drawdown
  const d80 = +(meta.ath * 0.20).toFixed(dec);
  if (d80 < price) orders.push({
    price: d80,
    label: '80% below ATH',
    sub: 'Historical altcoin bear bottom zone',
    lev: '25x', levColor: 'var(--amber)',
    size: '25% capital', type: 'hist'
  });

  // 85% drawdown
  const d85 = +(meta.ath * 0.15).toFixed(dec);
  if (d85 < price) orders.push({
    price: d85,
    label: '85% below ATH',
    sub: 'Deep bear / black swan zone',
    lev: '25x', levColor: 'var(--amber)',
    size: '30% capital', type: 'hist'
  });

  // 90% drawdown
  const d90 = +(meta.ath * 0.10).toFixed(dec);
  if (d90 < price) orders.push({
    price: d90,
    label: '90% below ATH — black swan',
    sub: 'Maximum conviction entry — generational level',
    lev: '10x', levColor: 'var(--green)',
    size: '30% capital', type: 'extreme'
  });

  // Sort by price descending
  orders.sort((a,b) => b.price - a.price);

  if (orders.length === 0) {
    return '<div class="no-data">No significant downside levels detected below current price.</div>';
  }

  let html = '<div style="margin-bottom:10px;font-size:10px;color:var(--text3)">Pre-set these on Blofin before the event happens. If price never reaches them, you miss nothing.</div>';
  orders.forEach(o => {
    html += `<div class="order-row">
      <span class="order-price red">$${fn(o.price, dec)}</span>
      <div class="order-label">
        <div class="order-label-main">${o.label}</div>
        <div class="order-label-sub">${o.sub}</div>
      </div>
      <span class="order-lev" style="background:rgba(0,0,0,0.3);color:${o.levColor};border:1px solid ${o.levColor}33">${o.lev}</span>
      <div class="order-size">${o.size}</div>
    </div>`;
  });
  return html;
}

// ── Render take profit plan ───────────────────────────────────────────────────
function renderTPPlan(coin, price) {
  const dec = COINS[coin].dec;
  const meta = COINS[coin];

  const tps = [
    { price: meta.prevHigh || +(meta.ath * 0.5).toFixed(dec), label: 'Previous cycle high — first exit', pct: '20% of position', type: 'conservative' },
    { price: meta.ath, label: 'ATH retest — main exit', pct: '30% of position', type: 'moderate' },
    { price: +(meta.ath * 1.5).toFixed(dec), label: 'New ATH +50% — cycle target', pct: '30% of position', type: 'aggressive' },
    { price: +(meta.ath * 2.5).toFixed(dec), label: 'New ATH +150% — let remainder ride', pct: '20% of position', type: 'ath' },
  ].filter(t => t.price > price);

  let html = '<div style="margin-bottom:10px;font-size:10px;color:var(--text3)">Scale out in stages. Never try to call the exact top — take profits at each level.</div>';
  tps.forEach(t => {
    const mult = (t.price / price).toFixed(1);
    const col = t.type === 'conservative' ? 'var(--green)' : t.type === 'moderate' ? 'var(--amber)' : t.type === 'aggressive' ? 'var(--red)' : 'var(--purple)';
    html += `<div class="order-row">
      <span class="order-price" style="color:${col}">$${fn(t.price, dec)}</span>
      <div class="order-label">
        <div class="order-label-main">${t.label}</div>
        <div class="order-label-sub">${mult}x from current · ${t.pct}</div>
      </div>
      <div class="order-size green">${t.pct}</div>
    </div>`;
  });
  return html;
}

// ── Fetch price if no scanner data ────────────────────────────────────────────
async function fetchPrice() {
  const container = document.getElementById('main-container');
  container.innerHTML = '<div class="loading full-width"><span class="spinner"></span> Fetching price data...</div>';

  try {
    const sym = COINS[activeCoin].sym;
    const [r, fgR] = await Promise.all([
      fetch(`https://api.bybit.com/v5/market/tickers?category=linear&symbol=${sym}`),
      fetch("https://api.alternative.me/fng/?limit=1")
    ]);
    const j = await r.json();
    const fgJ = await fgR.json().catch(()=>({data:[{value:50}]}));
    const fg = parseInt((fgJ?.data?.[0]?.value)||50);
    const ticker = j?.result?.list?.[0];
    if (ticker) {
      scannerData[activeCoin] = {
        coin: activeCoin, price: parseFloat(ticker.lastPrice),
        liqZones: null, ta: null,
        funding: parseFloat(ticker.fundingRate||0) * 100,
        fgValue: fg, sc: null, timestamp: Date.now()
      };
      render();
    } else {
      container.innerHTML = `<div class="no-data full-width">
        Could not load price data.<br>
        Open the <a href="/">scanner</a> first and view ${activeCoin} to populate data, then come back.
      </div>`;
    }
  } catch(e) {
    container.innerHTML = `<div class="no-data full-width">
      Open the <a href="/">scanner</a> and view ${activeCoin} first — this page reads live data from it.
    </div>`;
  }
}
