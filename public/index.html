<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Scanner — Crypto Trade Setups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #00d084;
    --green-bg: rgba(0,208,132,0.08);
    --green-border: rgba(0,208,132,0.25);
    --red: #ff4d4d;
    --red-bg: rgba(255,77,77,0.08);
    --red-border: rgba(255,77,77,0.25);
    --amber: #f5a623;
    --amber-bg: rgba(245,166,35,0.08);
    --blue: #4a9eff;
    --blue-bg: rgba(74,158,255,0.08);
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: var(--font-display); }
  body { min-height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; }
  .main { overflow-y: auto; }

  /* Sidebar */
  .logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .logo-text { font-size: 13px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--text); }
  .logo-sub { font-size: 10px; color: var(--text3); font-family: var(--font-mono); margin-top: 3px; letter-spacing: .08em; }

  .sidebar-section { padding: 0 12px; margin-bottom: 24px; }
  .sidebar-label { font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); font-family: var(--font-mono); padding: 0 8px; margin-bottom: 6px; }
  .coin-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 9px 10px; border-radius: 8px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-family: var(--font-display); font-size: 13px; transition: all .15s; margin-bottom: 2px; }
  .coin-btn:hover { background: var(--bg3); color: var(--text); }
  .coin-btn.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
  .coin-btn .coin-name { font-weight: 500; }
  .coin-btn .coin-price { font-family: var(--font-mono); font-size: 11px; }
  .coin-badge { font-size: 9px; font-family: var(--font-mono); padding: 2px 6px; border-radius: 4px; }
  .cb-long { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .cb-short { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .cb-neutral { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
  .cb-watch { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }

  .tf-btns { display: flex; gap: 4px; padding: 0 12px; margin-bottom: 20px; }
  .tf-btn { flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-family: var(--font-mono); font-size: 11px; cursor: pointer; text-align: center; transition: all .12s; }
  .tf-btn:hover { color: var(--text2); border-color: var(--border2); }
  .tf-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  .refresh-btn { margin: auto 12px 0; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-family: var(--font-mono); font-size: 11px; cursor: pointer; text-align: center; transition: all .15s; letter-spacing: .05em; }
  .refresh-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .refresh-btn:disabled { opacity: .4; cursor: not-allowed; }
  .last-upd { text-align: center; font-size: 10px; color: var(--text3); font-family: var(--font-mono); margin-top: 8px; padding: 0 12px; }

  /* Main content */
  .main-header { padding: 24px 28px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; padding-bottom: 20px; }
  .coin-title { font-size: 28px; font-weight: 700; letter-spacing: -.01em; }
  .coin-price-big { font-family: var(--font-mono); font-size: 22px; font-weight: 400; color: var(--text); }
  .coin-change { font-family: var(--font-mono); font-size: 13px; margin-left: 10px; }
  .score-display { text-align: right; }
  .score-num { font-family: var(--font-mono); font-size: 36px; font-weight: 500; line-height: 1; }
  .score-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-top: 4px; font-family: var(--font-mono); }
  .verdict-pill { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 500; font-family: var(--font-mono); letter-spacing: .05em; margin-top: 6px; }

  .content-grid { padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .full-width { grid-column: 1 / -1; }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .card-title { font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); font-family: var(--font-mono); margin-bottom: 14px; }
  .setup-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .setup-row:last-child { border-bottom: none; }
  .setup-key { font-size: 11px; color: var(--text2); font-family: var(--font-mono); }
  .setup-val { font-family: var(--font-mono); font-size: 12px; font-weight: 500; }
  .val-green { color: var(--green); }
  .val-red { color: var(--red); }
  .val-blue { color: var(--blue); }
  .val-amber { color: var(--amber); }
  .rr-tag { font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; font-family: var(--font-mono); }
  .rr-good { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .rr-bad { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* Chart */
  .chart-container { position: relative; height: 260px; width: 100%; }

  /* Metrics row */
  .metrics-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .metric { background: var(--bg3); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
  .metric-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; font-family: var(--font-mono); margin-bottom: 5px; }
  .metric-val { font-family: var(--font-mono); font-size: 15px; font-weight: 500; }
  .metric-sub { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: var(--font-mono); }

  /* Volume profile */
  .vol-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .vol-price { font-family: var(--font-mono); font-size: 10px; color: var(--text3); width: 80px; text-align: right; flex-shrink: 0; }
  .vol-track { flex: 1; height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .vol-fill { height: 100%; border-radius: 3px; }
  .vol-pct { font-family: var(--font-mono); font-size: 10px; color: var(--text3); min-width: 44px; }

  /* AI analysis */
  .ai-card { background: linear-gradient(135deg, rgba(74,158,255,0.04) 0%, rgba(0,208,132,0.04) 100%); border: 1px solid rgba(74,158,255,0.15); border-radius: 12px; padding: 18px; }
  .ai-loading { display: flex; align-items: center; gap: 10px; color: var(--text3); font-family: var(--font-mono); font-size: 12px; }
  .ai-summary { font-size: 13px; line-height: 1.7; color: var(--text); margin-bottom: 14px; }
  .ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .ai-block { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
  .ai-block-title { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; font-family: var(--font-mono); margin-bottom: 6px; }
  .ai-block-text { font-size: 12px; line-height: 1.6; color: var(--text2); }
  .ai-risk { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; font-size: 12px; color: var(--red); }
  .ai-action { background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--green); }
  .ai-pattern { font-size: 11px; color: var(--text3); font-family: var(--font-mono); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; line-height: 1.6; }

  /* Alerts banner */
  .alerts-bar { background: var(--green-bg); border-bottom: 1px solid var(--green-border); padding: 10px 28px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .alert-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; font-family: var(--font-mono); color: var(--green); flex-shrink: 0; }
  .alert-item { font-family: var(--font-mono); font-size: 11px; color: var(--green); padding: 3px 10px; background: rgba(0,208,132,0.1); border-radius: 4px; border: 1px solid var(--green-border); }

  /* Pred bars */
  .pred-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .pred-key { font-family: var(--font-mono); font-size: 11px; color: var(--text2); }
  .pred-right { display: flex; align-items: center; gap: 8px; }
  .pred-val { font-family: var(--font-mono); font-size: 12px; font-weight: 500; }
  .pred-bar-w { width: 80px; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .pred-bar { height: 100%; border-radius: 2px; }
  .pred-pct { font-family: var(--font-mono); font-size: 10px; color: var(--text3); min-width: 28px; }

  /* Spinner */
  .spin { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading state */
  .loading-full { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 12px; color: var(--text3); font-family: var(--font-mono); font-size: 12px; }

  /* OI section */
  .oi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .oi-item { background: var(--bg3); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
  .oi-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; font-family: var(--font-mono); color: var(--text3); margin-bottom: 5px; }
  .oi-val { font-family: var(--font-mono); font-size: 15px; font-weight: 500; }
  .oi-sub { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: var(--font-mono); }

  /* Scan table */
  .scan-table { width: 100%; border-collapse: collapse; }
  .scan-table th { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); font-family: var(--font-mono); padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; font-weight: 400; }
  .scan-table td { font-family: var(--font-mono); font-size: 12px; padding: 10px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
  .scan-table tr:last-child td { border-bottom: none; }
  .scan-table tbody tr { cursor: pointer; transition: background .12s; }
  .scan-table tbody tr:hover td { background: var(--bg3); }
  .scan-table tbody tr.active-row td { background: rgba(74,158,255,0.05); }
  .score-mini-bar { display: flex; align-items: center; gap: 6px; }
  .smb-track { width: 50px; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .smb-fill { height: 100%; border-radius: 2px; }

  /* Responsive */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { flex-direction: row; flex-wrap: wrap; padding: 12px; border-right: none; border-bottom: 1px solid var(--border); }
    .content-grid { grid-template-columns: 1fr; }
    .metrics-row { grid-template-columns: repeat(3, 1fr); }
    .ai-grid { grid-template-columns: 1fr; }
    .oi-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Signal Scanner</div>
      <div class="logo-sub">crypto trade setups</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Timeframe</div>
      <div class="tf-btns">
        <button class="tf-btn active" onclick="selectTF('1d',this)">1D</button>
        <button class="tf-btn" onclick="selectTF('4h',this)">4H</button>
        <button class="tf-btn" onclick="selectTF('1h',this)">1H</button>
        <button class="tf-btn" onclick="selectTF('15m',this)">15M</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Markets</div>
      <div id="coin-list">
        <div class="loading-full" style="min-height:120px"><div class="spin"></div></div>
      </div>
    </div>

    <button class="refresh-btn" id="refresh-btn" onclick="init()">↻ Refresh all data</button>
    <div class="last-upd" id="last-upd">—</div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div id="alerts-bar"></div>
    <div id="main-content">
      <div class="loading-full">
        <div class="spin"></div>
        <span>Fetching live market data...</span>
      </div>
    </div>
  </main>

</div>

<script>
const COINS = {
  BTC: { cgId: 'bitcoin',  sym: 'BTCUSDT',  dec: 0 },
  ETH: { cgId: 'ethereum', sym: 'ETHUSDT',  dec: 2 },
  SOL: { cgId: 'solana',   sym: 'SOLUSDT',  dec: 3 },
  XRP: { cgId: 'ripple',   sym: 'XRPUSDT',  dec: 4 },
  SUI: { cgId: 'sui',      sym: 'SUIUSDT',  dec: 4 }
};
const TF_INTERVAL = { '1d': '1d', '4h': '4h', '1h': '1h', '15m': '15m' };
const TF_LIMIT    = { '1d': 60,   '4h': 60,   '1h': 60,   '15m': 60 };

let activeCoin = 'BTC', activeTF = '1d';
let marketData = {}, klinesCache = {}, chartInst = null, aiCache = {};

// ── Formatting ──────────────────────────────────────────────────────────────
const fNum = (n, d) => n == null ? '—' : Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
const fPct = n => (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';

// ── Fetch helpers ────────────────────────────────────────────────────────────
async function jget(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + url);
  return r.json();
}

// ── Live data fetch ──────────────────────────────────────────────────────────
async function fetchMarket() {
  const ids = Object.values(COINS).map(c => c.cgId).join(',');
  const [cgData, fgData] = await Promise.all([
    jget(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&sparkline=false&price_change_percentage=24h`),
    jget('https://api.alternative.me/fng/?limit=1')
  ]);
  const cg = {};
  cgData.forEach(c => { cg[c.id] = c; });

  const fundingResults = await Promise.allSettled(
    Object.entries(COINS).map(([, m]) =>
      jget(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${m.sym}`)
    )
  );
  const oiResults = await Promise.allSettled(
    Object.entries(COINS).map(([, m]) =>
      jget(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${m.sym}`)
    )
  );

  Object.entries(COINS).forEach(([coin, meta], i) => {
    const d = cg[meta.cgId] || {};
    const funding = fundingResults[i].status === 'fulfilled'
      ? parseFloat(fundingResults[i].value.lastFundingRate) * 100 : 0.005;
    const oi = oiResults[i].status === 'fulfilled'
      ? parseFloat(oiResults[i].value.openInterest) : 0;
    marketData[coin] = {
      price:      d.current_price     || 0,
      change24h:  d.price_change_percentage_24h || 0,
      high24h:    d.high_24h          || 0,
      low24h:     d.low_24h           || 0,
      volume24h:  d.total_volume      || 0,
      marketCap:  d.market_cap        || 0,
      ath:        d.ath               || 0,
      funding,
      oiContracts: oi,
      oiNotional: oi * (d.current_price || 0),
      fgValue:    parseInt(fgData.data[0]?.value || 50),
      fgLabel:    fgData.data[0]?.value_classification || 'Neutral'
    };
  });
}

async function fetchKlines(coin, tf) {
  const key = coin + '_' + tf;
  if (klinesCache[key]) return klinesCache[key];
  const meta = COINS[coin];
  const data = await jget(
    `https://api.binance.com/api/v3/klines?symbol=${meta.sym}&interval=${TF_INTERVAL[tf]}&limit=${TF_LIMIT[tf]}`
  );
  const klines = data.map(k => ({ t: k[0], o: +k[1], h: +k[2], l: +k[3], c: +k[4], v: +k[5] }));
  klinesCache[key] = klines;
  return klines;
}

// ── Technical Analysis ───────────────────────────────────────────────────────
function calcTA(klines) {
  if (!klines || klines.length < 14) return {
    rsi: 50, ema20: null, ema50: null, atr: 0,
    trend: 'neutral', support: 0, resistance: 0, volProfile: []
  };
  const cl = klines.map(k => k.c), hi = klines.map(k => k.h), lo = klines.map(k => k.l);

  function ema(arr, p) {
    const k = 2 / (p + 1);
    let e = arr.slice(0, p).reduce((a, b) => a + b, 0) / p;
    for (let i = p; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
    return e;
  }
  const ema20 = ema(cl, 20);
  const ema50 = cl.length >= 50 ? ema(cl, 50) : null;

  let g = 0, l = 0;
  for (let i = cl.length - 14; i < cl.length; i++) {
    const d = cl[i] - cl[i - 1];
    if (d > 0) g += d; else l += Math.abs(d);
  }
  const rsi = 100 - (100 / (1 + (l === 0 ? 999 : g / l)));

  let atrSum = 0;
  for (let i = klines.length - 14; i < klines.length; i++) {
    const prev = cl[i - 1] || cl[i];
    atrSum += Math.max(hi[i] - lo[i], Math.abs(hi[i] - prev), Math.abs(lo[i] - prev));
  }
  const atr = atrSum / 14;

  const curr = cl[cl.length - 1];
  let trend = 'neutral';
  if (ema50) {
    if (curr > ema20 && ema20 > ema50) trend = 'bullish';
    else if (curr < ema20 && ema20 < ema50) trend = 'bearish';
    else if (curr > ema50) trend = 'mild-bullish';
    else trend = 'mild-bearish';
  } else {
    trend = curr > ema20 ? 'bullish' : 'bearish';
  }

  const recent = klines.slice(-20);
  const support    = Math.min(...recent.map(k => k.l));
  const resistance = Math.max(...recent.map(k => k.h));

  const minP = Math.min(...lo), maxP = Math.max(...hi), range = maxP - minP;
  const buckets = 8;
  const volProfile = Array.from({ length: buckets }, (_, i) => ({
    price: minP + range * (i + 0.5) / buckets, vol: 0
  }));
  klines.forEach(k => {
    const mid = (k.h + k.l) / 2;
    const idx = Math.min(buckets - 1, Math.floor((mid - minP) / range * buckets));
    if (volProfile[idx]) volProfile[idx].vol += k.v;
  });
  const maxVol = Math.max(...volProfile.map(b => b.vol));
  volProfile.forEach(b => { b.pct = maxVol > 0 ? b.vol / maxVol : 0; });

  return { rsi, ema20, ema50, atr, trend, support, resistance, volProfile };
}

// ── Signal Scoring ───────────────────────────────────────────────────────────
function scoreSignal(coin, ta) {
  const d = marketData[coin];
  if (!d) return 0;
  let s = 0;
  if (ta.trend === 'bullish') s += 2; else if (ta.trend === 'mild-bullish') s += 1;
  if (ta.rsi < 35) s += 2; else if (ta.rsi < 50) s += 1;
  if (d.funding < 0) s += 2; else if (d.funding < 0.01) s += 2; else if (d.funding < 0.03) s += 1;
  if (d.fgValue < 30) s += 2; else if (d.fgValue < 50) s += 1;
  if (d.change24h > 0 && d.change24h < 4) s += 1;
  else if (d.change24h >= -2 && d.change24h < 0) s += 1;
  return Math.round((s / 8) * 10);
}

function verdictOf(sc) {
  if (sc >= 7) return { text: 'Long setup', cls: 'cb-long',    pill: 'cb-long' };
  if (sc >= 5) return { text: 'Watch',      cls: 'cb-watch',   pill: 'cb-watch' };
  if (sc >= 3) return { text: 'Neutral',    cls: 'cb-neutral', pill: 'cb-neutral' };
  return              { text: 'Short bias', cls: 'cb-short',   pill: 'cb-short' };
}

function calcSetups(price, atr, dec) {
  const lSL   = +(price - atr * 1.5).toFixed(dec);
  const lTP1  = +(price + atr * 2.0).toFixed(dec);
  const lTP2  = +(price + atr * 3.5).toFixed(dec);
  const lRisk = (price - lSL) / price * 100;
  const lRew  = (lTP1 - price) / price * 100;
  const lRR   = lRew / lRisk;

  const sSL   = +(price + atr * 1.5).toFixed(dec);
  const sTP1  = +(price - atr * 2.0).toFixed(dec);
  const sTP2  = +(price - atr * 3.5).toFixed(dec);
  const sRisk = (sSL - price) / price * 100;
  const sRew  = (price - sTP1) / price * 100;
  const sRR   = sRew / sRisk;

  return { lSL, lTP1, lTP2, lRisk, lRew, lRR, sSL, sTP1, sTP2, sRisk, sRew, sRR };
}

// ── AI Analysis ──────────────────────────────────────────────────────────────
async function fetchAI(coin, ta, score) {
  const key = coin + '_' + activeTF;
  if (aiCache[key]) return aiCache[key];
  const d = marketData[coin];
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        coin, tf: activeTF,
        price: d.price, change24h: d.change24h,
        rsi: ta.rsi.toFixed(1), trend: ta.trend,
        funding: d.funding.toFixed(4), fgValue: d.fgValue,
        atr: ta.atr.toFixed(COINS[coin].dec > 2 ? 2 : COINS[coin].dec),
        oi: (d.oiNotional / 1e9).toFixed(2),
        support: ta.support, resistance: ta.resistance
      })
    });
    const json = await res.json();
    aiCache[key] = json;
    return json;
  } catch (e) {
    return null;
  }
}

// ── Chart ────────────────────────────────────────────────────────────────────
function buildChart(klines, s, ta, dec) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const el = document.getElementById('price-chart');
  if (!el || !klines.length) return;

  const labels = klines.map((k, i) => {
    if (activeTF === '1d') return new Date(k.t).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return new Date(k.t).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  });
  const closes = klines.map(k => k.c);

  const ema20 = [];
  if (closes.length >= 20) {
    const k2 = 2 / 21;
    let e = closes.slice(0, 20).reduce((a, b) => a + b, 0) / 20;
    for (let i = 0; i < 19; i++) ema20.push(null);
    ema20.push(e);
    for (let i = 20; i < closes.length; i++) { e = closes[i] * k2 + e * (1 - k2); ema20.push(e); }
  }

  chartInst = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Price',     data: closes,  borderColor: '#4a9eff', borderWidth: 2,   pointRadius: 0, tension: .3, fill: false },
        { label: 'EMA20',     data: ema20,   borderColor: '#185fa5', borderWidth: 1,   pointRadius: 0, tension: .3, fill: false, borderDash: [3,3] },
        { label: 'Long TP1',  data: Array(closes.length).fill(s.lTP1), borderColor: '#00d084', borderWidth: 1, pointRadius: 0, fill: false, borderDash: [6,3] },
        { label: 'Long stop', data: Array(closes.length).fill(s.lSL),  borderColor: '#ff4d4d', borderWidth: 1, pointRadius: 0, fill: false, borderDash: [6,3] },
        { label: 'Short TP1', data: Array(closes.length).fill(s.sTP1), borderColor: '#f5a623', borderWidth: 1, pointRadius: 0, fill: false, borderDash: [2,4] },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false, backgroundColor: '#181818', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, callbacks: { label: ctx => `${ctx.dataset.label}: $${fNum(ctx.raw, dec > 2 ? 2 : dec)}` } } },
      scales: {
        x: { ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 10, maxRotation: 0 }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#555', font: { size: 10 }, callback: v => '$' + fNum(v, dec > 2 ? 2 : dec) }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

// ── Navigation ───────────────────────────────────────────────────────────────
async function selectCoin(c) {
  activeCoin = c;
  aiCache = {};
  document.getElementById('main-content').innerHTML = `<div class="loading-full"><div class="spin"></div><span>Loading ${c}...</span></div>`;
  try {
    const klines = await fetchKlines(c, activeTF);
    const scores = {};
    Object.keys(COINS).forEach(cc => {
      const kl = klinesCache[cc + '_' + activeTF] || klinesCache[cc + '_1d'] || [];
      scores[cc] = scoreSignal(cc, calcTA(kl));
    });
    renderSidebar(scores);
    renderAlerts(scores);
    await renderDetail(c, klines);
  } catch (e) {
    document.getElementById('main-content').innerHTML = `<div class="loading-full"><span style="color:var(--red)">Error loading ${c}: ${e.message}</span></div>`;
  }
}

  klinesCache = {};
  aiCache = {};
  await selectCoin(activeCoin);
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ Refreshing...';
  klinesCache = {};
  aiCache = {};

  try {
    await fetchMarket();
    const klines = await fetchKlines(activeCoin, activeTF);

    await Promise.allSettled(
      Object.keys(COINS).filter(c => c !== activeCoin).map(c => fetchKlines(c, activeTF))
    );

    const scores = {};
    Object.keys(COINS).forEach(c => {
      const kl = klinesCache[c + '_' + activeTF] || [];
      scores[c] = scoreSignal(c, calcTA(kl));
    });

    renderSidebar(scores);
    renderAlerts(scores);
    await renderDetail(activeCoin, klines);

    document.getElementById('last-upd').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('main-content').innerHTML = `<div class="loading-full"><span style="color:var(--red);font-family:var(--font-mono);font-size:12px">Error: ${e.message}</span></div>`;
  }

  btn.disabled = false;
  btn.textContent = '↻ Refresh all data';
}

init();
</script>
</body>
</html>
