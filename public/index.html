<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Scanner — Crypto Trade Setups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#1e1e1e;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#f0f0f0;--text2:#888;--text3:#444;
    --green:#00d084;--green-bg:rgba(0,208,132,0.08);--green-b:rgba(0,208,132,0.25);
    --red:#ff4d4d;--red-bg:rgba(255,77,77,0.08);--red-b:rgba(255,77,77,0.25);
    --amber:#f5a623;--amber-bg:rgba(245,166,35,0.08);
    --blue:#4a9eff;--blue-bg:rgba(74,158,255,0.08);
    --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg);color:var(--text);font-family:var(--display)}
  body{min-height:100vh}
  .app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}

  .sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column}
  .logo{padding:0 18px 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
  .logo-text{font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
  .logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
  .sb-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);padding:0 18px;margin-bottom:6px}
  .tf-row{display:flex;gap:4px;padding:0 12px;margin-bottom:20px}
  .tf-btn{flex:1;padding:6px 0;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:center;transition:all .12s}
  .tf-btn:hover{color:var(--text2);border-color:var(--border2)}
  .tf-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
  .coin-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--display);font-size:13px;transition:all .15s;margin-bottom:2px}
  .coin-btn:hover{background:var(--bg3);color:var(--text)}
  .coin-btn.active{background:var(--bg3);color:var(--text);outline:1px solid var(--border2)}
  .coin-name{font-weight:500}
  .coin-meta{text-align:right}
  .coin-px{font-family:var(--mono);font-size:10px;color:var(--text3);display:block}
  .cbadge{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:4px;display:inline-block;margin-top:2px}
  .cbl{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
  .cbs{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
  .cbn{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
  .cbw{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,166,35,.25)}
  .sb-coins{padding:0 6px;flex:1;overflow-y:auto}
  .rbtn{margin:auto 12px 0;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:center;transition:all .15s}
  .rbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
  .rbtn:disabled{opacity:.4;cursor:not-allowed}
  .last-upd{text-align:center;font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:8px;padding:0 12px}

  .main{overflow-y:auto;display:flex;flex-direction:column}
  .alerts-bar{background:var(--green-bg);border-bottom:1px solid var(--green-b);padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .alert-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--green);flex-shrink:0}
  .alert-item{font-family:var(--mono);font-size:11px;color:var(--green);padding:3px 10px;background:rgba(0,208,132,.1);border-radius:4px;border:1px solid var(--green-b)}

  .mhdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .coin-tf{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .coin-full{font-size:24px;font-weight:700}
  .price-row{display:flex;align-items:baseline;gap:8px;margin-top:4px}
  .price-big{font-family:var(--mono);font-size:20px}
  .price-chg{font-family:var(--mono);font-size:13px}
  .score-box{text-align:right}
  .score-num{font-family:var(--mono);font-size:34px;font-weight:500;line-height:1}
  .score-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-top:3px}

  .entry-toggle{display:flex;align-items:center;gap:10px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
  .et-label{font-size:11px;color:var(--text2);font-family:var(--mono)}
  .et-btns{display:flex;gap:4px}
  .et-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .12s}
  .et-btn.active{background:var(--blue-bg);color:var(--blue);border-color:rgba(74,158,255,.3)}
  .et-info{font-size:10px;color:var(--text3);font-family:var(--mono)}

  .content{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .full{grid-column:1/-1}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
  .card-title{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
  .srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
  .srow:last-child{border-bottom:none}
  .skey{font-size:11px;color:var(--text2);font-family:var(--mono)}
  .sval{font-family:var(--mono);font-size:12px;font-weight:500}
  .vg{color:var(--green)}.vr{color:var(--red)}.vb{color:var(--blue)}.va{color:var(--amber)}
  .rrtag{font-size:9px;padding:2px 6px;border-radius:3px;margin-left:5px;font-family:var(--mono)}
  .rrg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
  .rrr{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
  .opt-note{font-size:10px;color:var(--amber);font-family:var(--mono);margin-top:8px;padding:6px 8px;background:var(--amber-bg);border-radius:6px;border:1px solid rgba(245,166,35,.2);line-height:1.5}

  .tv-wrap{width:100%;height:440px;border-radius:8px;overflow:hidden;background:var(--bg3)}

  .metrics-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .metric{background:var(--bg3);border-radius:8px;padding:10px;border:1px solid var(--border)}
  .mlbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:4px}
  .mval{font-family:var(--mono);font-size:14px;font-weight:500}
  .msub{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

  .vrow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .vp-lbl{font-family:var(--mono);font-size:10px;color:var(--text3);width:76px;text-align:right;flex-shrink:0}
  .vtrack{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
  .vfill{height:100%;border-radius:3px}
  .vpct{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:42px}

  .oi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .oic{background:var(--bg3);border-radius:8px;padding:10px;border:1px solid var(--border)}
  .oil{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--text3);margin-bottom:4px}
  .oiv{font-family:var(--mono);font-size:14px;font-weight:500}
  .ois{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

  .prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
  .pk{font-family:var(--mono);font-size:11px;color:var(--text2)}
  .pright{display:flex;align-items:center;gap:8px}
  .pval{font-family:var(--mono);font-size:12px;font-weight:500}
  .pbar-w{width:80px;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
  .pbar{height:100%;border-radius:2px}
  .ppct{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:26px}
  .pred-levels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}

  .ai-card{background:linear-gradient(135deg,rgba(74,158,255,.04),rgba(0,208,132,.04));border:1px solid rgba(74,158,255,.15);border-radius:12px;padding:16px}
  .ai-loading{display:flex;align-items:center;gap:10px;color:var(--text3);font-family:var(--mono);font-size:12px}
  .ai-summary{font-size:13px;line-height:1.7;color:var(--text);margin-bottom:12px}
  .ai-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .ai-block{background:rgba(255,255,255,.03);border-radius:8px;padding:12px;border:1px solid var(--border)}
  .ai-btitle{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:5px}
  .ai-btext{font-size:12px;line-height:1.6;color:var(--text2)}
  .ai-risk{background:var(--red-bg);border:1px solid var(--red-b);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:var(--red)}
  .ai-action{background:var(--green-bg);border:1px solid var(--green-b);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:var(--green)}
  .ai-pattern{font-size:11px;color:var(--text3);font-family:var(--mono);border-top:1px solid var(--border);padding-top:10px;margin-top:4px;line-height:1.6}

  .stable{width:100%;border-collapse:collapse}
  .stable th{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:var(--mono);padding:7px 8px;border-bottom:1px solid var(--border);text-align:left;font-weight:400}
  .stable td{font-family:var(--mono);font-size:12px;padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text)}
  .stable tr:last-child td{border-bottom:none}
  .stable tbody tr{cursor:pointer;transition:background .12s}
  .stable tbody tr:hover td{background:var(--bg3)}
  .stable tbody tr.arow td{background:rgba(74,158,255,.05)}
  .smbar{display:flex;align-items:center;gap:6px}
  .smtrack{width:46px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
  .smfill{height:100%;border-radius:2px}

  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:10px;color:var(--text3);font-family:var(--mono);font-size:12px}
  .pos{color:var(--green)}.neg{color:var(--red)}
  .foot{font-size:10px;color:var(--text3);font-family:var(--mono);padding-top:12px;border-top:1px solid var(--border);margin-top:4px;line-height:1.6}

  @media(max-width:900px){
    .app{grid-template-columns:1fr}
    .content{grid-template-columns:1fr}
    .metrics-grid{grid-template-columns:repeat(3,1fr)}
    .ai-2col{grid-template-columns:1fr}
    .oi-grid{grid-template-columns:1fr 1fr}
    .pred-levels{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-text">Signal Scanner</div>
    <div class="logo-sub">crypto trade setups</div>
  </div>
  <div class="sb-label" style="margin-bottom:6px">Timeframe</div>
  <div class="tf-row">
    <button class="tf-btn active" onclick="selectTF('1d',this)">1D</button>
    <button class="tf-btn" onclick="selectTF('4h',this)">4H</button>
    <button class="tf-btn" onclick="selectTF('1h',this)">1H</button>
    <button class="tf-btn" onclick="selectTF('15m',this)">15M</button>
  </div>
  <div class="sb-label">Markets</div>
  <div class="sb-coins" id="coin-list"><div class="loading-full" style="min-height:80px"><div class="spin"></div></div></div>
  <button class="rbtn" id="rbtn" onclick="init()">↻ Refresh all data</button>
  <div class="last-upd" id="last-upd">—</div>
</aside>

<main class="main">
  <div id="alerts-bar"></div>
  <div id="main-content"><div class="loading-full"><div class="spin"></div><span>Fetching live data from Binance...</span></div></div>
</main>
</div>

<script>
const COINS={
  BTC:{sym:'BTCUSDT',tv:'BINANCE:BTCUSDT',dec:0,name:'Bitcoin'},
  ETH:{sym:'ETHUSDT',tv:'BINANCE:ETHUSDT',dec:2,name:'Ethereum'},
  SOL:{sym:'SOLUSDT',tv:'BINANCE:SOLUSDT',dec:3,name:'Solana'},
  XRP:{sym:'XRPUSDT',tv:'BINANCE:XRPUSDT',dec:4,name:'XRP'},
  SUI:{sym:'SUIUSDT',tv:'BINANCE:SUIUSDT',dec:4,name:'Sui'}
};
const TF_TV={'1d':'D','4h':'240','1h':'60','15m':'15'};
const TF_BI={'1d':'1d','4h':'4h','1h':'1h','15m':'15m'};

let activeCoin='BTC',activeTF='1d',entryMode='optimal';
let mktData={},klCache={},aiCache={};

const fn=(n,d)=>n==null?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d??0,maximumFractionDigits:d??0});
const fp=n=>(n>=0?'+':'')+Number(n).toFixed(2)+'%';

async function jget(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function fetchMarket(){
  const tickers=await jget('https://api.binance.com/api/v3/ticker/24hr?symbols=["BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT","SUIUSDT"]');
  tickers.forEach(t=>{
    const coin=Object.keys(COINS).find(c=>COINS[c].sym===t.symbol);
    if(!coin)return;
    mktData[coin]={
      price:parseFloat(t.lastPrice),
      change24h:parseFloat(t.priceChangePercent),
      high24h:parseFloat(t.highPrice),
      low24h:parseFloat(t.lowPrice),
      volume24h:parseFloat(t.quoteVolume),
      funding:0,oi:0,oiNotional:0,fgValue:50,fgLabel:'Neutral'
    };
  });
  await Promise.allSettled(Object.entries(COINS).map(async([coin,meta])=>{
    try{const fi=await jget(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${meta.sym}`);mktData[coin].funding=parseFloat(fi.lastFundingRate)*100;}catch(e){}
    try{const oi=await jget(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${meta.sym}`);mktData[coin].oi=parseFloat(oi.openInterest);mktData[coin].oiNotional=mktData[coin].oi*mktData[coin].price;}catch(e){}
  }));
  try{const fg=await jget('https://api.alternative.me/fng/?limit=1');const val=parseInt(fg.data[0]?.value||50);const lbl=fg.data[0]?.value_classification||'Neutral';Object.keys(COINS).forEach(c=>{mktData[c].fgValue=val;mktData[c].fgLabel=lbl;});}catch(e){}
}

async function fetchKlines(coin,tf){
  const key=coin+'_'+tf;
  if(klCache[key])return klCache[key];
  const data=await jget(`https://api.binance.com/api/v3/klines?symbol=${COINS[coin].sym}&interval=${TF_BI[tf]}&limit=100`);
  const klines=data.map(k=>({t:k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));
  klCache[key]=klines;
  return klines;
}

function calcTA(klines){
  if(!klines||klines.length<14)return{rsi:50,ema20:0,ema50:null,atr:0,trend:'neutral',support:0,resistance:0,volProfile:[],poc:0};
  const cl=klines.map(k=>k.c),hi=klines.map(k=>k.h),lo=klines.map(k=>k.l);
  function ema(arr,p){const k=2/(p+1);let e=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;for(let i=p;i<arr.length;i++)e=arr[i]*k+e*(1-k);return e;}
  const ema20=ema(cl,20);
  const ema50=cl.length>=50?ema(cl,50):null;
  let g=0,l=0;
  for(let i=cl.length-14;i<cl.length;i++){const d=cl[i]-cl[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  const rsi=100-(100/(1+(l===0?999:g/l)));
  let atrS=0;
  for(let i=klines.length-14;i<klines.length;i++){const prev=cl[i-1]||cl[i];atrS+=Math.max(hi[i]-lo[i],Math.abs(hi[i]-prev),Math.abs(lo[i]-prev));}
  const atr=atrS/14;
  const curr=cl[cl.length-1];
  let trend='neutral';
  if(ema50){if(curr>ema20&&ema20>ema50)trend='bullish';else if(curr<ema20&&ema20<ema50)trend='bearish';else if(curr>ema50)trend='mild-bullish';else trend='mild-bearish';}
  else trend=curr>ema20?'bullish':'bearish';
  const rec=klines.slice(-20);
  const support=Math.min(...rec.map(k=>k.l));
  const resistance=Math.max(...rec.map(k=>k.h));
  const minP=Math.min(...lo),maxP=Math.max(...hi),range=maxP-minP,buckets=8;
  const volProfile=Array.from({length:buckets},(_,i)=>({price:minP+range*(i+0.5)/buckets,vol:0,pct:0}));
  klines.forEach(k=>{const mid=(k.h+k.l)/2;const idx=Math.min(buckets-1,Math.floor((mid-minP)/range*buckets));if(volProfile[idx])volProfile[idx].vol+=k.v;});
  const maxVol=Math.max(...volProfile.map(b=>b.vol));
  volProfile.forEach(b=>{b.pct=maxVol>0?b.vol/maxVol:0;});
  const poc=volProfile.reduce((a,b)=>b.vol>a.vol?b:a,volProfile[0]).price;
  return{rsi,ema20,ema50,atr,trend,support,resistance,volProfile,poc};
}

function calcEntries(price,ta,dec){
  const atr=ta.atr||price*0.02;
  const supportEntry=+(ta.support+atr*0.3).toFixed(dec);
  const pullbackEntry=+(price-atr*0.75).toFixed(dec);
  const optimalLong=Math.max(supportEntry,pullbackEntry);
  const resistEntry=+(ta.resistance-atr*0.3).toFixed(dec);
  const rallyEntry=+(price+atr*0.75).toFixed(dec);
  const optimalShort=Math.min(resistEntry,rallyEntry);
  const isOptimal=entryMode==='optimal';
  return{
    long:isOptimal?optimalLong:price,
    short:isOptimal?optimalShort:price,
    atr,
    pullbackPct:((price-(isOptimal?optimalLong:price))/price*100),
    rallyPct:(((isOptimal?optimalShort:price)-price)/price*100)
  };
}

function calcSetups(entries,dec){
  const{long:lE,short:sE,atr}=entries;
  const lSL=+(lE-atr*1.5).toFixed(dec);
  const lTP1=+(lE+atr*2.5).toFixed(dec);
  const lTP2=+(lE+atr*4.0).toFixed(dec);
  const lRisk=(lE-lSL)/lE*100;
  const lRew=(lTP1-lE)/lE*100;
  const lRR=lRew/lRisk;
  const sSL=+(sE+atr*1.5).toFixed(dec);
  const sTP1=+(sE-atr*2.5).toFixed(dec);
  const sTP2=+(sE-atr*4.0).toFixed(dec);
  const sRisk=(sSL-sE)/sE*100;
  const sRew=(sE-sTP1)/sE*100;
  const sRR=sRew/sRisk;
  return{lE,lSL,lTP1,lTP2,lRisk,lRew,lRR,sE,sSL,sTP1,sTP2,sRisk,sRew,sRR};
}

function scoreSignal(coin,ta){
  const d=mktData[coin];if(!d)return 0;
  let s=0;
  if(ta.trend==='bullish')s+=2;else if(ta.trend==='mild-bullish')s+=1;
  if(ta.rsi<35)s+=2;else if(ta.rsi<50)s+=1;
  if(d.funding<0)s+=2;else if(d.funding<0.01)s+=2;else if(d.funding<0.03)s+=1;
  if(d.fgValue<30)s+=2;else if(d.fgValue<50)s+=1;
  if(d.change24h>0&&d.change24h<4)s+=1;else if(d.change24h>=-2&&d.change24h<0)s+=1;
  return Math.round((s/8)*10);
}

function verdictOf(sc){
  if(sc>=7)return{text:'Long setup',cls:'cbl'};
  if(sc>=5)return{text:'Watch',cls:'cbw'};
  if(sc>=3)return{text:'Neutral',cls:'cbn'};
  return{text:'Short bias',cls:'cbs'};
}

function buildTVChart(coin,tf){
  const container=document.getElementById('tv-chart');
  if(!container)return;
  container.innerHTML='';
  const script=document.createElement('script');
  script.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.async=true;
  script.innerHTML=JSON.stringify({
    autosize:true,symbol:COINS[coin].tv,interval:TF_TV[tf],
    timezone:'Etc/UTC',theme:'dark',style:'1',locale:'en',
    enable_publishing:false,backgroundColor:'rgba(17,17,17,1)',
    gridColor:'rgba(255,255,255,0.04)',hide_top_toolbar:false,
    hide_legend:false,save_image:false,calendar:false,hide_volume:false,
    support_host:'https://www.tradingview.com'
  });
  container.appendChild(script);
}

async function fetchAI(coin,ta,sc,setup){
  const key=coin+'_'+activeTF+'_'+entryMode;
  if(aiCache[key])return aiCache[key];
  const d=mktData[coin];
  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        coin,tf:activeTF,price:d.price,change24h:d.change24h,
        rsi:ta.rsi.toFixed(1),trend:ta.trend,
        funding:d.funding.toFixed(4),fgValue:d.fgValue,
        atr:ta.atr.toFixed(COINS[coin].dec>2?2:COINS[coin].dec),
        oi:(d.oiNotional/1e9).toFixed(2),
        support:ta.support,resistance:ta.resistance,
        optimalLongEntry:setup.lE,optimalShortEntry:setup.sE,
        entryMode
      })
    });
    if(!res.ok)throw new Error('API '+res.status);
    const json=await res.json();
    if(json.error)throw new Error(json.error);
    aiCache[key]=json;
    return json;
  }catch(e){console.error('AI:',e);return null;}
}

function renderSidebar(scores){
  const sorted=Object.keys(COINS).map(c=>({c,sc:scores[c]||0})).sort((a,b)=>b.sc-a.sc);
  document.getElementById('coin-list').innerHTML=sorted.map(({c,sc})=>{
    const d=mktData[c]||{};const v=verdictOf(sc);
    const chCls=(d.change24h||0)>=0?'pos':'neg';
    return`<button class="coin-btn ${c===activeCoin?'active':''}" onclick="selectCoin('${c}')">
      <span class="coin-name">${c}</span>
      <span class="coin-meta">
        <span class="coin-px">$${fn(d.price,COINS[c].dec)} <span class="${chCls}">${fp(d.change24h||0)}</span></span>
        <span class="cbadge ${v.cls}">${v.text}</span>
      </span>
    </button>`;
  }).join('');
}

function renderAlerts(scores){
  const fired=Object.entries(scores).filter(([,sc])=>sc>=7);
  const el=document.getElementById('alerts-bar');
  if(!fired.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="alerts-bar"><span class="alert-lbl">High conviction</span>${fired.map(([c,sc])=>`<span class="alert-item">${c} — ${sc}/10 Long setup</span>`).join('')}</div>`;
}

async function renderDetail(coin,klines){
  const d=mktData[coin];
  const dec=COINS[coin].dec;
  const ta=calcTA(klines);
  const sc=scoreSignal(coin,ta);
  const v=verdictOf(sc);
  const entries=calcEntries(d.price,ta,dec);
  const setup=calcSetups(entries,dec);

  const scColor=sc>=7?'var(--green)':sc>=5?'var(--amber)':sc>=3?'var(--text2)':'var(--red)';
  const chCls=d.change24h>=0?'pos':'neg';
  const bullP=Math.min(85,Math.max(20,35+sc*5+(ta.trend==='bullish'?12:ta.trend==='mild-bullish'?6:0)));
  const bearP=100-bullP;
  const pm=(ta.atr/d.price*100);
  const bullT=+(d.price*(1+pm/100)).toFixed(dec);
  const bearT=+(d.price*(1-pm/100)).toFixed(dec);
  let tCol='var(--text2)',tLbl='Neutral';
  if(ta.trend==='bullish'){tCol='var(--green)';tLbl='Bullish';}
  else if(ta.trend==='mild-bullish'){tCol='#7de0b0';tLbl='Mild bullish';}
  else if(ta.trend==='mild-bearish'){tCol='var(--amber)';tLbl='Mild bearish';}
  else if(ta.trend==='bearish'){tCol='var(--red)';tLbl='Bearish';}
  const rsiCol=ta.rsi<35?'var(--green)':ta.rsi>65?'var(--red)':'var(--text)';
  const fCol=d.funding<0.01?'var(--green)':d.funding>0.04?'var(--red)':'var(--text)';

  let volHTML='';
  if(ta.volProfile.length){
    [...ta.volProfile].reverse().forEach(b=>{
      const pct=Math.round(b.pct*100);const isPOC=pct>=88;
      volHTML+=`<div class="vrow"><span class="vp-lbl" style="color:${isPOC?'var(--blue)':'var(--text3)'}">$${fn(b.price,dec>2?2:dec)}</span><div class="vtrack"><div class="vfill" style="width:${pct}%;background:${isPOC?'var(--blue)':'rgba(255,255,255,.15)'}"></div></div><span class="vpct">${pct}%${isPOC?' POC':''}</span></div>`;
    });
  }

  const lOptNote=entryMode==='optimal'&&entries.pullbackPct>0.01
    ?`<div class="opt-note">Wait for pullback ${entries.pullbackPct.toFixed(2)}% → $${fn(setup.lE,dec)} before entering long</div>`:'';
  const sOptNote=entryMode==='optimal'&&entries.rallyPct>0.01
    ?`<div class="opt-note">Wait for rally ${entries.rallyPct.toFixed(2)}% → $${fn(setup.sE,dec)} before entering short</div>`:'';

  document.getElementById('main-content').innerHTML=`
    <div class="mhdr">
      <div>
        <div class="coin-tf">${coin} / USDT — ${activeTF}</div>
        <div class="coin-full">${COINS[coin].name}</div>
        <div class="price-row">
          <span class="price-big">$${fn(d.price,dec)}</span>
          <span class="price-chg ${chCls}">${fp(d.change24h)}</span>
          <span class="cbadge ${v.cls}" style="margin-left:8px">${v.text}</span>
        </div>
      </div>
      <div class="score-box">
        <div class="score-num" style="color:${scColor}">${sc}<span style="font-size:16px;color:var(--text3)">/10</span></div>
        <div class="score-lbl">Signal score</div>
      </div>
    </div>

    <div class="entry-toggle">
      <span class="et-label">Entry mode:</span>
      <div class="et-btns">
        <button class="et-btn ${entryMode==='optimal'?'active':''}" onclick="setEntryMode('optimal')">Optimal entry</button>
        <button class="et-btn ${entryMode==='current'?'active':''}" onclick="setEntryMode('current')">Current price</button>
      </div>
      <span class="et-info">${entryMode==='optimal'?'Waits for pullback/rally to best price':'Enters at current market price'}</span>
    </div>

    <div class="content">

      <div class="card full">
        <div class="card-title">Live chart — TradingView (${activeTF} candlesticks)</div>
        <div class="tv-wrap"><div class="tradingview-widget-container" id="tv-chart" style="height:100%;width:100%"></div></div>
      </div>

      <div class="card" style="border-left:3px solid var(--green)">
        <div class="card-title" style="color:var(--green)">Long setup</div>
        <div class="srow"><span class="skey">${entryMode==='optimal'?'Optimal entry':'Entry (market)'}</span><span class="sval vb">$${fn(setup.lE,dec)}</span></div>
        <div class="srow"><span class="skey">Stop loss</span><span class="sval vr">$${fn(setup.lSL,dec)} <span style="font-size:10px;color:var(--text3)">-${setup.lRisk.toFixed(2)}%</span></span></div>
        <div class="srow"><span class="skey">Take profit 1</span><span class="sval vg">$${fn(setup.lTP1,dec)} <span style="font-size:10px;color:var(--text3)">+${setup.lRew.toFixed(2)}%</span></span></div>
        <div class="srow"><span class="skey">Take profit 2</span><span class="sval vg">$${fn(setup.lTP2,dec)}</span></div>
        <div class="srow"><span class="skey">R:R ratio</span><span class="sval">${setup.lRR.toFixed(2)}:1 <span class="rrtag ${setup.lRR>=1.5?'rrg':'rrr'}">${setup.lRR>=1.5?'good':'weak'}</span></span></div>
        <div class="srow"><span class="skey">ATR volatility</span><span class="sval">$${fn(ta.atr,dec>2?2:dec)}</span></div>
        ${lOptNote}
      </div>

      <div class="card" style="border-left:3px solid var(--red)">
        <div class="card-title" style="color:var(--red)">Short setup</div>
        <div class="srow"><span class="skey">${entryMode==='optimal'?'Optimal entry':'Entry (market)'}</span><span class="sval vb">$${fn(setup.sE,dec)}</span></div>
        <div class="srow"><span class="skey">Stop loss</span><span class="sval vr">$${fn(setup.sSL,dec)} <span style="font-size:10px;color:var(--text3)">+${setup.sRisk.toFixed(2)}%</span></span></div>
        <div class="srow"><span class="skey">Take profit 1</span><span class="sval vg">$${fn(setup.sTP1,dec)} <span style="font-size:10px;color:var(--text3)">-${setup.sRew.toFixed(2)}%</span></span></div>
        <div class="srow"><span class="skey">Take profit 2</span><span class="sval vg">$${fn(setup.sTP2,dec)}</span></div>
        <div class="srow"><span class="skey">R:R ratio</span><span class="sval">${setup.sRR.toFixed(2)}:1 <span class="rrtag ${setup.sRR>=1.5?'rrg':'rrr'}">${setup.sRR>=1.5?'good':'weak'}</span></span></div>
        <div class="srow"><span class="skey">ATR volatility</span><span class="sval">$${fn(ta.atr,dec>2?2:dec)}</span></div>
        ${sOptNote}
      </div>

      <div class="card full">
        <div class="card-title">Technical indicators</div>
        <div class="metrics-grid">
          <div class="metric"><div class="mlbl">RSI 14</div><div class="mval" style="color:${rsiCol}">${ta.rsi.toFixed(1)}</div><div class="msub">${ta.rsi<30?'Oversold':ta.rsi>70?'Overbought':ta.rsi<45?'Neutral low':'Neutral high'}</div></div>
          <div class="metric"><div class="mlbl">EMA 20</div><div class="mval">$${fn(ta.ema20,dec>2?2:dec)}</div><div class="msub" style="color:${d.price>ta.ema20?'var(--green)':'var(--red)'}">${d.price>ta.ema20?'Above':'Below'}</div></div>
          <div class="metric"><div class="mlbl">ATR 14</div><div class="mval">$${fn(ta.atr,dec>2?2:dec)}</div><div class="msub">Volatility</div></div>
          <div class="metric"><div class="mlbl">Trend</div><div class="mval" style="color:${tCol};font-size:12px">${tLbl}</div><div class="msub">EMA structure</div></div>
          <div class="metric"><div class="mlbl">Fear & Greed</div><div class="mval">${d.fgValue}</div><div class="msub">${d.fgLabel}</div></div>
          <div class="metric"><div class="mlbl">Funding rate</div><div class="mval" style="color:${fCol}">${d.funding.toFixed(4)}%</div><div class="msub">8h rate</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Open interest</div>
        <div class="oi-grid">
          <div class="oic"><div class="oil">OI notional</div><div class="oiv">$${(d.oiNotional/1e9).toFixed(1)}B</div><div class="ois">Open contracts × price</div></div>
          <div class="oic"><div class="oil">Funding rate</div><div class="oiv" style="color:${fCol}">${d.funding.toFixed(4)}%</div><div class="ois">Positive = longs pay</div></div>
          <div class="oic"><div class="oil">OI signal</div><div class="oiv" style="font-size:11px;color:var(--text2)">${d.funding<0.005?'Longs underfunded':d.funding>0.04?'Overleveraged long':'Balanced'}</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Volume profile — ${activeTF}</div>
        ${volHTML||'<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">Insufficient data</span>'}
      </div>

      <div class="card full">
        <div class="card-title">Predictive movement model</div>
        <div class="prow"><span class="pk">Bull scenario — +${pm.toFixed(2)}% (1 ATR)</span><div class="pright"><span class="pval vg">$${fn(bullT,dec)}</span><div class="pbar-w"><div class="pbar" style="width:${bullP}%;background:var(--green)"></div></div><span class="ppct">${bullP}%</span></div></div>
        <div class="prow"><span class="pk">Bear scenario — -${pm.toFixed(2)}% (1 ATR)</span><div class="pright"><span class="pval vr">$${fn(bearT,dec)}</span><div class="pbar-w"><div class="pbar" style="width:${bearP}%;background:var(--red)"></div></div><span class="ppct">${bearP}%</span></div></div>
        <div class="pred-levels">
          <div class="metric"><div class="mlbl">Key support</div><div class="mval vb">$${fn(ta.support,dec)}</div></div>
          <div class="metric"><div class="mlbl">Key resistance</div><div class="mval va">$${fn(ta.resistance,dec)}</div></div>
          <div class="metric"><div class="mlbl">Volume POC</div><div class="mval vb">$${fn(ta.poc,dec>2?2:dec)}</div></div>
        </div>
      </div>

      <div class="ai-card full" id="ai-section">
        <div class="card-title" style="color:var(--blue)">AI analysis — Claude</div>
        <div class="ai-loading"><div class="spin"></div><span>Generating analysis for ${coin}...</span></div>
      </div>

      <div class="card full">
        <div class="card-title">All markets — signal ranking</div>
        <table class="stable"><thead><tr>
          <th>Coin</th><th>Score</th><th>Price</th><th>24h</th>
          <th>OI</th><th>Funding</th><th>RSI</th><th>Trend</th><th>Signal</th>
        </tr></thead><tbody id="scan-tbody"></tbody></table>
      </div>

      <div class="foot full">Data: Binance (live prices, klines, funding, OI) · Alternative.me (Fear & Greed) · TradingView (chart). Stops = 1.5× ATR. Not financial advice — always manage your own risk.</div>
    </div>
  `;

  buildTVChart(coin,activeTF);
  renderScanBody();
  loadAI(coin,ta,sc,setup);
}

function renderScanBody(){
  const tbody=document.getElementById('scan-tbody');if(!tbody)return;
  const rows=Object.keys(COINS).map(c=>{
    const kl=klCache[c+'_'+activeTF]||[];const ta=calcTA(kl);
    return{c,sc:scoreSignal(c,ta),d:mktData[c]||{},ta};
  }).sort((a,b)=>b.sc-a.sc);
  const bc=sc=>sc>=7?'var(--green)':sc>=5?'var(--amber)':'var(--red)';
  tbody.innerHTML=rows.map(({c,sc,d,ta})=>{
    const v=verdictOf(sc);const dec=COINS[c].dec;const ch=d.change24h||0;
    let tl='Neutral';
    if(ta.trend==='bullish')tl='Bullish';else if(ta.trend==='mild-bullish')tl='Mild bull';
    else if(ta.trend==='bearish')tl='Bearish';else if(ta.trend==='mild-bearish')tl='Mild bear';
    return`<tr class="${c===activeCoin?'arow':''}" onclick="selectCoin('${c}')">
      <td style="font-weight:500">${c}</td>
      <td><div class="smbar"><div class="smtrack"><div class="smfill" style="width:${sc*10}%;background:${bc(sc)}"></div></div>${sc}/10</div></td>
      <td>$${fn(d.price,dec)}</td>
      <td class="${ch>=0?'pos':'neg'}">${fp(ch)}</td>
      <td>$${(d.oiNotional/1e9).toFixed(1)}B</td>
      <td>${d.funding.toFixed(4)}%</td>
      <td style="color:${ta.rsi<40?'var(--green)':ta.rsi>60?'var(--red)':'var(--text)'}">${ta.rsi.toFixed(1)}</td>
      <td>${tl}</td>
      <td><span class="cbadge ${v.cls}">${v.text}</span></td>
    </tr>`;
  }).join('');
}

async function loadAI(coin,ta,sc,setup){
  const ai=await fetchAI(coin,ta,sc,setup);
  const el=document.getElementById('ai-section');if(!el)return;
  if(!ai){
    el.innerHTML=`<div class="card-title" style="color:var(--blue)">AI analysis — Claude</div>
      <div style="font-size:12px;color:var(--text3);font-family:var(--mono);line-height:1.8">AI analysis unavailable. Ensure ANTHROPIC_API_KEY is set correctly in Vercel → Settings → Environment Variables, then redeploy.</div>`;
    return;
  }
  const cCol=ai.conviction==='high'?'var(--green)':ai.conviction==='medium'?'var(--amber)':'var(--text3)';
  const bCol=ai.bias==='long'?'var(--green)':ai.bias==='short'?'var(--red)':'var(--text3)';
  el.innerHTML=`
    <div class="card-title" style="color:var(--blue)">AI analysis — Claude
      <span style="margin-left:10px;font-size:9px;color:${cCol}">CONVICTION: ${(ai.conviction||'').toUpperCase()}</span>
      <span style="margin-left:8px;font-size:9px;color:${bCol}">BIAS: ${(ai.bias||'').toUpperCase()}</span>
    </div>
    <p class="ai-summary">${ai.summary||''}</p>
    <div class="ai-2col">
      <div class="ai-block"><div class="ai-btitle" style="color:var(--green)">Bull case</div><div class="ai-btext">${ai.longCase||'—'}</div></div>
      <div class="ai-block"><div class="ai-btitle" style="color:var(--red)">Bear case</div><div class="ai-btext">${ai.shortCase||'—'}</div></div>
    </div>
    <div class="ai-risk">Key risk: ${ai.keyRisk||'—'}</div>
    <div class="ai-action">Suggested action: ${ai.suggestedAction||'—'}</div>
    <div class="ai-pattern">Historical pattern: ${ai.historicalPattern||'—'}</div>
  `;
}

async function selectCoin(c){
  activeCoin=c;aiCache={};
  document.getElementById('main-content').innerHTML=`<div class="loading-full"><div class="spin"></div><span>Loading ${c}...</span></div>`;
  try{
    const klines=await fetchKlines(c,activeTF);
    const scores={};Object.keys(COINS).forEach(cc=>{scores[cc]=scoreSignal(cc,calcTA(klCache[cc+'_'+activeTF]||[]));});
    renderSidebar(scores);renderAlerts(scores);
    await renderDetail(c,klines);
  }catch(e){document.getElementById('main-content').innerHTML=`<div class="loading-full"><span style="color:var(--red)">Error: ${e.message}</span></div>`;}
}

async function selectTF(tf,btn){
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeTF=tf;klCache={};aiCache={};
  await selectCoin(activeCoin);
}

async function setEntryMode(mode){
  entryMode=mode;aiCache={};
  const klines=klCache[activeCoin+'_'+activeTF]||[];
  if(klines.length)await renderDetail(activeCoin,klines);
}

async function init(){
  const btn=document.getElementById('rbtn');
  btn.disabled=true;btn.textContent='↻ Refreshing...';
  klCache={};aiCache={};
  try{
    await fetchMarket();
    const klines=await fetchKlines(activeCoin,activeTF);
    await Promise.allSettled(Object.keys(COINS).filter(c=>c!==activeCoin).map(c=>fetchKlines(c,activeTF)));
    const scores={};Object.keys(COINS).forEach(c=>{scores[c]=scoreSignal(c,calcTA(klCache[c+'_'+activeTF]||[]));});
    renderSidebar(scores);renderAlerts(scores);
    await renderDetail(activeCoin,klines);
    document.getElementById('last-upd').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading-full"><span style="color:var(--red);font-family:var(--mono);font-size:12px">Error: ${e.message}</span></div>`;
  }
  btn.disabled=false;btn.textContent='↻ Refresh all data';
}

init();
</script>
</body>
</html>
