<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Scanner — Crypto Trade Setups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#1e1e1e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#888;--text3:#444;
  --green:#00d084;--green-bg:rgba(0,208,132,0.08);--green-b:rgba(0,208,132,0.25);
  --red:#ff4d4d;--red-bg:rgba(255,77,77,0.08);--red-b:rgba(255,77,77,0.25);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,0.08);--amber-b:rgba(245,166,35,0.25);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,0.08);--blue-b:rgba(74,158,255,0.25);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.08);--purple-b:rgba(167,139,250,0.25);
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--display)}
body{min-height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:0 16px 18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.logo-text{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
.logo-sub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.sb-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);padding:0 16px;margin-bottom:5px}
.tf-row{display:flex;gap:3px;padding:0 10px;margin-bottom:18px}
.tf-btn{flex:1;padding:5px 0;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;text-align:center;transition:all .12s}
.tf-btn:hover{color:var(--text2);border-color:var(--border2)}
.tf-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.coin-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--display);font-size:12px;transition:all .15s;margin-bottom:2px}
.coin-btn:hover{background:var(--bg3);color:var(--text)}
.coin-btn.active{background:var(--bg3);color:var(--text);outline:1px solid var(--border2)}
.coin-name{font-weight:500}
.coin-meta{text-align:right}
.coin-px{font-family:var(--mono);font-size:9px;color:var(--text3);display:block}
.cbadge{font-size:8px;font-family:var(--mono);padding:2px 5px;border-radius:3px;display:inline-block;margin-top:2px}
.cbl{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.cbs{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.cbn{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.cbw{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.sb-coins{padding:0 5px;flex:1}
.rbtn{margin:auto 10px 0;padding:9px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;text-align:center;transition:all .15s}
.rbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.rbtn:disabled{opacity:.4;cursor:not-allowed}
.last-upd{text-align:center;font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:6px;padding:0 10px}

.main{overflow-y:auto}
.alerts-bar{background:var(--green-bg);border-bottom:1px solid var(--green-b);padding:9px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.alert-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--green);flex-shrink:0}
.alert-item{font-family:var(--mono);font-size:10px;color:var(--green);padding:2px 8px;background:rgba(0,208,132,.1);border-radius:3px;border:1px solid var(--green-b)}

.mhdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px}
.coin-tf{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.coin-full{font-size:22px;font-weight:700}
.price-row{display:flex;align-items:baseline;gap:8px;margin-top:4px;flex-wrap:wrap}
.price-big{font-family:var(--mono);font-size:19px}
.price-chg{font-family:var(--mono);font-size:12px}
.score-box{text-align:right}
.score-num{font-family:var(--mono);font-size:32px;font-weight:500;line-height:1}
.score-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-top:2px}

.entry-toggle{display:flex;align-items:center;gap:8px;padding:9px 22px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.et-label{font-size:10px;color:var(--text2);font-family:var(--mono)}
.et-btns{display:flex;gap:3px}
.et-btn{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s}
.et-btn.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-b)}
.et-info{font-size:9px;color:var(--text3);font-family:var(--mono)}

.content{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.card-title{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);margin-bottom:10px}

.srow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.skey{font-size:10px;color:var(--text2);font-family:var(--mono)}
.sval{font-family:var(--mono);font-size:11px;font-weight:500}
.vg{color:var(--green)}.vr{color:var(--red)}.vb{color:var(--blue)}.va{color:var(--amber)}.vp{color:var(--purple)}
.rrtag{font-size:8px;padding:2px 5px;border-radius:3px;margin-left:4px;font-family:var(--mono)}
.rrg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.rrr{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.opt-note{font-size:9px;color:var(--amber);font-family:var(--mono);margin-top:7px;padding:5px 7px;background:var(--amber-bg);border-radius:5px;border:1px solid var(--amber-b);line-height:1.5}
.pattern-note{font-size:9px;color:var(--purple);font-family:var(--mono);margin-top:7px;padding:5px 7px;background:var(--purple-bg);border-radius:5px;border:1px solid var(--purple-b);line-height:1.5}

.tv-wrap{width:100%;height:460px;border-radius:7px;overflow:hidden;background:var(--bg3)}

/* Pattern card */
.pattern-card{background:linear-gradient(135deg,var(--purple-bg),rgba(167,139,250,0.02));border:1px solid var(--purple-b);border-radius:10px;padding:14px}
.pattern-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.pattern-name{font-size:16px;font-weight:700;color:var(--purple)}
.pattern-badges{display:flex;gap:6px;flex-wrap:wrap}
.pbadge{font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:4px}
.pb-high{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.pb-medium{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.pb-low{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.pb-stage{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-b)}
.pb-winrate{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}
.pattern-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.pattern-levels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pl-item{background:rgba(255,255,255,.03);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
.pl-label{font-size:8px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--text3);margin-bottom:3px}
.pl-val{font-family:var(--mono);font-size:12px;font-weight:500}
.watch-level{background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:7px;padding:8px 10px;font-size:11px;color:var(--amber);margin-bottom:8px}
.action-level{background:var(--green-bg);border:1px solid var(--green-b);border-radius:7px;padding:8px 10px;font-size:11px;color:var(--green)}

.metrics-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.metric{background:var(--bg3);border-radius:7px;padding:9px 10px;border:1px solid var(--border)}
.mlbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:4px}
.mval{font-family:var(--mono);font-size:13px;font-weight:500}
.msub{font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

.vrow{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.vp-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);width:72px;text-align:right;flex-shrink:0}
.vtrack{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.vfill{height:100%;border-radius:3px}
.vpct{font-family:var(--mono);font-size:9px;color:var(--text3);min-width:40px}

.oi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.oic{background:var(--bg3);border-radius:7px;padding:9px 10px;border:1px solid var(--border)}
.oil{font-size:8px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--text3);margin-bottom:4px}
.oiv{font-family:var(--mono);font-size:13px;font-weight:500}
.ois{font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-wrap:wrap;gap:5px}
.pk{font-family:var(--mono);font-size:10px;color:var(--text2)}
.pright{display:flex;align-items:center;gap:7px}
.pval{font-family:var(--mono);font-size:11px;font-weight:500}
.pbar-w{width:75px;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pbar{height:100%;border-radius:2px}
.ppct{font-family:var(--mono);font-size:9px;color:var(--text3);min-width:24px}
.pred-levels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:10px}

.ai-card{background:linear-gradient(135deg,rgba(74,158,255,.04),rgba(0,208,132,.04));border:1px solid rgba(74,158,255,.15);border-radius:10px;padding:14px}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-family:var(--mono);font-size:11px}
.ai-summary{font-size:12px;line-height:1.7;color:var(--text);margin-bottom:10px}
.ai-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ai-block{background:rgba(255,255,255,.03);border-radius:7px;padding:10px;border:1px solid var(--border)}
.ai-btitle{font-size:8px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:4px}
.ai-btext{font-size:11px;line-height:1.6;color:var(--text2)}
.ai-risk{background:var(--red-bg);border:1px solid var(--red-b);border-radius:7px;padding:8px 10px;margin-bottom:7px;font-size:11px;color:var(--red)}
.ai-action{background:var(--green-bg);border:1px solid var(--green-b);border-radius:7px;padding:8px 10px;margin-bottom:7px;font-size:11px;color:var(--green)}
.ai-pattern-hist{font-size:10px;color:var(--text3);font-family:var(--mono);border-top:1px solid var(--border);padding-top:8px;margin-top:3px;line-height:1.6}

.stable{width:100%;border-collapse:collapse}
.stable th{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:var(--mono);padding:6px 7px;border-bottom:1px solid var(--border);text-align:left;font-weight:400}
.stable td{font-family:var(--mono);font-size:11px;padding:8px 7px;border-bottom:1px solid var(--border);color:var(--text)}
.stable tr:last-child td{border-bottom:none}
.stable tbody tr{cursor:pointer;transition:background .12s}
.stable tbody tr:hover td{background:var(--bg3)}
.stable tbody tr.arow td{background:rgba(74,158,255,.05)}
.smbar{display:flex;align-items:center;gap:5px}
.smtrack{width:44px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.smfill{height:100%;border-radius:2px}

.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:10px;color:var(--text3);font-family:var(--mono);font-size:12px}
.pos{color:var(--green)}.neg{color:var(--red)}
.foot{font-size:9px;color:var(--text3);font-family:var(--mono);padding-top:10px;border-top:1px solid var(--border);margin-top:4px;line-height:1.6}

@media(max-width:960px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto}
  .content{grid-template-columns:1fr}
  .metrics-grid{grid-template-columns:repeat(3,1fr)}
  .ai-2col{grid-template-columns:1fr}
  .oi-grid{grid-template-columns:1fr 1fr}
  .pred-levels{grid-template-columns:1fr 1fr}
  .pattern-levels{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-text">Signal Scanner</div>
    <div class="logo-sub">crypto trade setups</div>
  </div>
  <div class="sb-label" style="margin-bottom:5px">Timeframe</div>
  <div class="tf-row">
    <button class="tf-btn active" onclick="selectTF('1d',this)">1D</button>
    <button class="tf-btn" onclick="selectTF('4h',this)">4H</button>
    <button class="tf-btn" onclick="selectTF('1h',this)">1H</button>
    <button class="tf-btn" onclick="selectTF('15m',this)">15M</button>
  </div>
  <div class="sb-label">Markets</div>
  <div class="sb-coins" id="coin-list"><div class="loading-full" style="min-height:80px"><div class="spin"></div></div></div>
  <button class="rbtn" id="rbtn" onclick="init()">↻ Refresh all data</button>
  <div class="last-upd" id="last-upd">—</div>
</aside>

<main class="main">
  <div id="alerts-bar"></div>
  <div id="main-content"><div class="loading-full"><div class="spin"></div><span>Fetching live data from Binance...</span></div></div>
</main>
</div>

<script>
const COINS={
  BTC:{sym:'BTCUSDT',tv:'BINANCE:BTCUSDT',dec:0,name:'Bitcoin'},
  ETH:{sym:'ETHUSDT',tv:'BINANCE:ETHUSDT',dec:2,name:'Ethereum'},
  SOL:{sym:'SOLUSDT',tv:'BINANCE:SOLUSDT',dec:3,name:'Solana'},
  XRP:{sym:'XRPUSDT',tv:'BINANCE:XRPUSDT',dec:4,name:'XRP'},
  SUI:{sym:'SUIUSDT',tv:'BINANCE:SUIUSDT',dec:4,name:'Sui'}
};
const TF_TV={'1d':'D','4h':'240','1h':'60','15m':'15'};
const TF_BI={'1d':'1d','4h':'4h','1h':'1h','15m':'15m'};

let activeCoin='BTC',activeTF='1d',entryMode='optimal';
let mktData={},klCache={},aiCache={};

const fn=(n,d)=>n==null?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d??0,maximumFractionDigits:d??0});
const fp=n=>(n>=0?'+':'')+Number(n).toFixed(2)+'%';

async function api(params){
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`/api/market?${qs}`);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function fetchMarket(){
  const tickers=await api({type:'tickers'});
  tickers.forEach(t=>{
    const coin=Object.keys(COINS).find(c=>COINS[c].sym===t.symbol);
    if(!coin)return;
    mktData[coin]={price:parseFloat(t.lastPrice),change24h:parseFloat(t.priceChangePercent),high24h:parseFloat(t.highPrice),low24h:parseFloat(t.lowPrice),volume24h:parseFloat(t.quoteVolume),funding:0,oi:0,oiNotional:0,fgValue:50,fgLabel:'Neutral'};
  });
  await Promise.allSettled(Object.entries(COINS).map(async([coin,meta])=>{
    try{const fi=await api({type:'funding',symbol:meta.sym});mktData[coin].funding=parseFloat(fi.lastFundingRate)*100;}catch(e){}
    try{const oi=await api({type:'oi',symbol:meta.sym});mktData[coin].oi=parseFloat(oi.openInterest);mktData[coin].oiNotional=mktData[coin].oi*mktData[coin].price;}catch(e){}
  }));
  try{const fg=await api({type:'fg'});const val=parseInt(fg.data[0]?.value||50);const lbl=fg.data[0]?.value_classification||'Neutral';Object.keys(COINS).forEach(c=>{mktData[c].fgValue=val;mktData[c].fgLabel=lbl;});}catch(e){}
}

async function fetchKlines(coin,tf){
  const key=coin+'_'+tf;
  if(klCache[key])return klCache[key];
  const data=await api({type:'klines',symbol:COINS[coin].sym,interval:TF_BI[tf],limit:100});
  const klines=data.map(k=>({t:k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));
  klCache[key]=klines;return klines;
}

function calcTA(klines){
  if(!klines||klines.length<14)return{rsi:50,ema20:0,ema50:null,atr:0,trend:'neutral',support:0,resistance:0,volProfile:[],poc:0};
  const cl=klines.map(k=>k.c),hi=klines.map(k=>k.h),lo=klines.map(k=>k.l);
  function ema(arr,p){const k=2/(p+1);let e=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;for(let i=p;i<arr.length;i++)e=arr[i]*k+e*(1-k);return e;}
  const ema20=ema(cl,20);
  const ema50=cl.length>=50?ema(cl,50):null;
  let g=0,l=0;
  for(let i=cl.length-14;i<cl.length;i++){const d=cl[i]-cl[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  const rsi=100-(100/(1+(l===0?999:g/l)));
  let atrS=0;
  for(let i=klines.length-14;i<klines.length;i++){const prev=cl[i-1]||cl[i];atrS+=Math.max(hi[i]-lo[i],Math.abs(hi[i]-prev),Math.abs(lo[i]-prev));}
  const atr=atrS/14;
  const curr=cl[cl.length-1];
  let trend='neutral';
  if(ema50){if(curr>ema20&&ema20>ema50)trend='bullish';else if(curr<ema20&&ema20<ema50)trend='bearish';else if(curr>ema50)trend='mild-bullish';else trend='mild-bearish';}
  else trend=curr>ema20?'bullish':'bearish';
  const rec=klines.slice(-20);
  const support=Math.min(...rec.map(k=>k.l));
  const resistance=Math.max(...rec.map(k=>k.h));
  const minP=Math.min(...lo),maxP=Math.max(...hi),range=maxP-minP,buckets=8;
  const volProfile=Array.from({length:buckets},(_,i)=>({price:minP+range*(i+0.5)/buckets,vol:0,pct:0}));
  klines.forEach(k=>{const mid=(k.h+k.l)/2;const idx=Math.min(buckets-1,Math.floor((mid-minP)/range*buckets));if(volProfile[idx])volProfile[idx].vol+=k.v;});
  const maxVol=Math.max(...volProfile.map(b=>b.vol));
  volProfile.forEach(b=>{b.pct=maxVol>0?b.vol/maxVol:0;});
  const poc=volProfile.reduce((a,b)=>b.vol>a.vol?b:a,volProfile[0]).price;
  return{rsi,ema20,ema50,atr,trend,support,resistance,volProfile,poc};
}

function calcEntries(price,ta,dec){
  const atr=ta.atr||price*0.02;
  const supportEntry=+(ta.support+atr*0.3).toFixed(dec);
  const pullbackEntry=+(price-atr*0.75).toFixed(dec);
  const optimalLong=Math.max(supportEntry,pullbackEntry);
  const resistEntry=+(ta.resistance-atr*0.3).toFixed(dec);
  const rallyEntry=+(price+atr*0.75).toFixed(dec);
  const optimalShort=Math.min(resistEntry,rallyEntry);
  const isOpt=entryMode==='optimal';
  return{long:isOpt?optimalLong:price,short:isOpt?optimalShort:price,atr,pullbackPct:((price-(isOpt?optimalLong:price))/price*100),rallyPct:(((isOpt?optimalShort:price)-price)/price*100)};
}

function calcSetups(entries,dec){
  const{long:lE,short:sE,atr}=entries;
  const lSL=+(lE-atr*1.5).toFixed(dec),lTP1=+(lE+atr*2.5).toFixed(dec),lTP2=+(lE+atr*4.0).toFixed(dec);
  const lRisk=(lE-lSL)/lE*100,lRew=(lTP1-lE)/lE*100,lRR=lRew/lRisk;
  const sSL=+(sE+atr*1.5).toFixed(dec),sTP1=+(sE-atr*2.5).toFixed(dec),sTP2=+(sE-atr*4.0).toFixed(dec);
  const sRisk=(sSL-sE)/sE*100,sRew=(sE-sTP1)/sE*100,sRR=sRew/sRisk;
  return{lE,lSL,lTP1,lTP2,lRisk,lRew,lRR,sE,sSL,sTP1,sTP2,sRisk,sRew,sRR};
}

function scoreSignal(coin,ta){
  const d=mktData[coin];if(!d)return 0;
  let s=0;
  if(ta.trend==='bullish')s+=2;else if(ta.trend==='mild-bullish')s+=1;
  if(ta.rsi<35)s+=2;else if(ta.rsi<50)s+=1;
  if(d.funding<0)s+=2;else if(d.funding<0.01)s+=2;else if(d.funding<0.03)s+=1;
  if(d.fgValue<30)s+=2;else if(d.fgValue<50)s+=1;
  if(d.change24h>0&&d.change24h<4)s+=1;else if(d.change24h>=-2&&d.change24h<0)s+=1;
  return Math.round((s/8)*10);
}

function verdictOf(sc){
  if(sc>=7)return{text:'Long setup',cls:'cbl'};
  if(sc>=5)return{text:'Watch',cls:'cbw'};
  if(sc>=3)return{text:'Neutral',cls:'cbn'};
  return{text:'Short bias',cls:'cbs'};
}

async function fetchAI(coin,ta,sc,setup,klines){
  const key=coin+'_'+activeTF+'_'+entryMode;
  if(aiCache[key])return aiCache[key];
  const d=mktData[coin];
  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        coin,tf:activeTF,price:d.price,change24h:d.change24h,
        rsi:ta.rsi.toFixed(1),trend:ta.trend,
        funding:d.funding.toFixed(4),fgValue:d.fgValue,
        atr:ta.atr.toFixed(COINS[coin].dec>2?2:COINS[coin].dec),
        oi:(d.oiNotional/1e9).toFixed(2),
        support:ta.support,resistance:ta.resistance,
        optimalLongEntry:setup.lE,optimalShortEntry:setup.sE,
        entryMode,
        candles:klines.slice(-50).map(k=>({o:+k.o.toFixed(COINS[coin].dec),h:+k.h.toFixed(COINS[coin].dec),l:+k.l.toFixed(COINS[coin].dec),c:+k.c.toFixed(COINS[coin].dec),v:Math.round(k.v)}))
      })
    });
    if(!res.ok)throw new Error('API '+res.status);
    const json=await res.json();
    if(json.error)throw new Error(json.error);
    aiCache[key]=json;return json;
  }catch(e){console.error('AI:',e);return null;}
}

  if(aiEl){
    aiEl.innerHTML=`
      <div class="card-title" style="color:var(--blue)">AI analysis — Claude
        <span style="margin-left:10px;font-size:8px;color:${cCol}">CONVICTION: ${(ai.conviction||'').toUpperCase()}</span>
        <span style="margin-left:8px;font-size:8px;color:${bCol}">BIAS: ${(ai.bias||'').toUpperCase()}</span>
      </div>
      <p class="ai-summary">${ai.summary||''}</p>
      <div class="ai-2col">
        <div class="ai-block"><div class="ai-btitle" style="color:var(--green)">Bull case</div><div class="ai-btext">${ai.longCase||'—'}</div></div>
        <div class="ai-block"><div class="ai-btitle" style="color:var(--red)">Bear case</div><div class="ai-btext">${ai.shortCase||'—'}</div></div>
      </div>
      <div class="ai-risk">Key risk: ${ai.keyRisk||'—'}</div>
      <div class="ai-action">Suggested action: ${ai.suggestedAction||'—'}</div>
      <div class="ai-pattern-hist">Historical pattern context: ${ai.historicalPattern||'—'}</div>
    `;
  }
}

async function selectCoin(c){
  activeCoin=c;aiCache={};
  document.getElementById('main-content').innerHTML=`<div class="loading-full"><div class="spin"></div><span>Loading ${c}...</span></div>`;
  try{
    const klines=await fetchKlines(c,activeTF);
    const scores={};Object.keys(COINS).forEach(cc=>{scores[cc]=scoreSignal(cc,calcTA(klCache[cc+'_'+activeTF]||[]));});
    renderSidebar(scores);renderAlerts(scores);
    await renderDetail(c,klines);
  }catch(e){document.getElementById('main-content').innerHTML=`<div class="loading-full"><span style="color:var(--red)">Error: ${e.message}</span></div>`;}
}

async function selectTF(tf,btn){
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeTF=tf;klCache={};aiCache={};
  await selectCoin(activeCoin);
}

async function setEntryMode(mode){
  entryMode=mode;aiCache={};
  const klines=klCache[activeCoin+'_'+activeTF]||[];
  if(klines.length)await renderDetail(activeCoin,klines);
}

async function init(){
  const btn=document.getElementById('rbtn');
  btn.disabled=true;btn.textContent='↻ Refreshing...';
  klCache={};aiCache={};
  try{
    await fetchMarket();
    const klines=await fetchKlines(activeCoin,activeTF);
    await Promise.allSettled(Object.keys(COINS).filter(c=>c!==activeCoin).map(c=>fetchKlines(c,activeTF)));
    const scores={};Object.keys(COINS).forEach(c=>{scores[c]=scoreSignal(c,calcTA(klCache[c+'_'+activeTF]||[]));});
    renderSidebar(scores);renderAlerts(scores);
    await renderDetail(activeCoin,klines);
    document.getElementById('last-upd').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading-full"><span style="color:var(--red);font-family:var(--mono);font-size:12px">Error: ${e.message}</span></div>`;
  }
  btn.disabled=false;btn.textContent='↻ Refresh all data';
}

init();
</script>
</body>
</html>
